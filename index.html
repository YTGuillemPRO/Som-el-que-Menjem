<script>
    // 1. Missatges motivadors per a les mestres
    const frases = [
        "Preparat per aprendre coses increïbles?",
        "L'IE Temple a tope amb la salut!",
        "Menjar bé és viure millor 🍎",
        "Ets un futur geni de la biologia!"
    ];
    
    // Canviar el subtítol aleatòriament al carregar
    window.onload = () => {
        const randomFrase = frases[Math.floor(Math.random() * frases.length)];
        document.querySelector('.subtitle').innerText = "IE Temple · " + randomFrase;
        
        // Comprovar si és de nit per activar el mode fosc automàtic
        const hora = new Date().getHours();
        if (hora > 20 || hora < 8) {
            document.body.style.filter = "brightness(0.9) contrast(1.1)";
            console.log("Mode nit activat automàticament");
        }
    };

    // 2. Funció principal de navegació amb transició
    function showView(viewName) {
        const app = document.getElementById('app');
        
        // Efecte de "pampalluga" professional (Fade out/in)
        app.style.opacity = "0";
        app.style.transform = "scale(0.95)";
        
        setTimeout(() => {
            // Amagar totes les vistes
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            
            // Mostrar la seleccionada
            const nextView = document.getElementById(viewName + '-view');
            nextView.classList.add('active');
            
            // Canviar el títol dinàmicament
            if(viewName === 'home') {
                document.querySelector('.app-container h1').innerText = "Portal de Salut";
            }
            
            // Tornar a mostrar amb efecte
            app.style.opacity = "1";
            app.style.transform = "scale(1)";
        }, 300);

        // 3. So de clic (Opcional: fa un petit 'pop' visual si no vols carregar audio)
        console.log("Navegant a: " + viewName);
    }

    // 4. Funció extra per al botó Discord (efecte visual)
    const discordBtn = document.querySelector('.discord-btn');
    discordBtn.addEventListener('mouseover', () => {
        confetti({
            particleCount: 10,
            spread: 20,
            origin: { y: 0.9, x: 0.9 },
            colors: ['#5865F2', '#ffffff']
        });
    });
</script>
