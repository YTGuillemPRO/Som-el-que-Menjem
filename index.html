<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioPortal</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<style>

:root{
--accent:#2ecc71;
--blue:#0071e3;
--orange:#ff9500;
--discord:#5865F2;
--glass:rgba(255,255,255,0.75);
--bg:#0f172a;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Plus Jakarta Sans',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(-45deg,#0f172a,#1e293b,#020617,#0f172a);
background-size:400% 400%;
animation:bgMove 20s ease infinite;
overflow:hidden;
color:#111;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Glass panel */

.glass-panel{
background:var(--glass);
backdrop-filter:blur(40px) saturate(180%);
-webkit-backdrop-filter:blur(40px);
border-radius:48px;
padding:65px;
width:90%;
max-width:900px;
text-align:center;
border:1px solid rgba(255,255,255,0.3);
box-shadow:
0 40px 120px rgba(0,0,0,0.6),
inset 0 1px rgba(255,255,255,0.4);
transition:.5s;
}

h1{
font-size:56px;
font-weight:800;
letter-spacing:-2px;
margin-bottom:8px;
}

.subtitle{
color:#515154;
font-size:18px;
margin-bottom:50px;
}

/* Grid */

.main-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

/* Cards */

.nav-card{
background:white;
padding:50px 35px;
border-radius:32px;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
transition:.35s;
border:1px solid rgba(0,0,0,0.06);
position:relative;
overflow:hidden;
}

.nav-card::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(46,204,113,0.2),transparent);
opacity:0;
transition:.4s;
}

.nav-card:hover::before{
opacity:1;
}

.nav-card:hover{
transform:translateY(-12px) scale(1.04);
box-shadow:0 25px 60px rgba(0,0,0,0.15);
border-color:var(--accent);
}

.icon-circle{
width:95px;
height:95px;
border-radius:28px;
background:#f5f5f7;
display:flex;
align-items:center;
justify-content:center;
font-size:44px;
margin-bottom:20px;
transition:.3s;
}

.nav-card:hover .icon-circle{
background:#e8f5e9;
transform:rotate(-6deg) scale(1.1);
box-shadow:0 10px 30px rgba(46,204,113,0.3);
}

.nav-card h2{
font-size:28px;
font-weight:700;
}

/* Views */

.view{display:none;}
.active{display:block;animation:fade .4s;}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* Buttons */

.btn-group{
display:grid;
grid-template-columns:1fr 1fr;
gap:22px;
}

.btn-action{
padding:25px;
border-radius:20px;
font-weight:700;
font-size:18px;
text-decoration:none;
color:white;
transition:.25s;
}

.btn-teo{background:var(--blue);}
.btn-joc{background:var(--orange);}

.btn-action:hover{
transform:scale(1.06);
filter:brightness(1.1);
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

/* Back */

.back-btn{
margin-top:40px;
display:inline-block;
color:#6e6e73;
cursor:pointer;
padding:10px 18px;
border-radius:30px;
}

.back-btn:hover{
background:rgba(0,0,0,0.05);
color:black;
}

/* Discord / school */

.insti-pill{
position:fixed;
bottom:35px;
right:35px;
background:var(--discord);
color:white;
padding:16px 28px;
border-radius:18px;
text-decoration:none;
font-weight:600;
display:flex;
gap:10px;
align-items:center;
box-shadow:0 15px 40px rgba(88,101,242,0.45);
transition:.25s;
}

.insti-pill:hover{
transform:scale(1.1);
border-radius:12px;
}

@media(max-width:700px){

.glass-panel{
padding:45px 35px;
}

.main-grid{
grid-template-columns:1fr;
}

.btn-group{
grid-template-columns:1fr;
}

h1{
font-size:40px;
}

}

</style>
</head>

<body>

<div class="glass-panel" id="main-panel">

<div id="home-view" class="view active">
<h1>BioPortal</h1>
<p class="subtitle">IE Temple · Explora el cos humà amb IA</p>

<div class="main-grid">

<div class="nav-card" onclick="navTo('digestio')">
<div class="icon-circle">🍔</div>
<h2>Digestió</h2>
</div>

<div class="nav-card" onclick="navTo('nutricio')">
<div class="icon-circle">🥗</div>
<h2>Nutrició</h2>
</div>

</div>
</div>

<div id="selection-view" class="view">

<h1 id="selection-title">Títol</h1>
<p class="subtitle">Tria una activitat per començar</p>

<div class="btn-group">

<a id="link-teoria" class="btn-action btn-teo">📖 Teoria Visual</a>

<a id="link-joc" class="btn-action btn-joc">🎮 Joc Interactiu</a>

</div>

<div class="back-btn" onclick="goBack()">← Tornar al menú</div>

</div>

</div>

<a href="https://agora.xtec.cat/ietemple/" target="_blank" class="insti-pill" id="confettiBtn">
🏛️ IE Temple
</a>

<script>

function navTo(type){

const panel=document.getElementById('main-panel')

panel.style.transform='scale(.95)'
panel.style.opacity='0'

setTimeout(()=>{

document.getElementById('home-view').classList.remove('active')
document.getElementById('selection-view').classList.add('active')

const title=document.getElementById('selection-title')
const t=document.getElementById('link-teoria')
const j=document.getElementById('link-joc')

if(type==='digestio'){

title.innerText="Digestió"
t.href="teoria-digestio.html"
j.href="activitats-digestio.html"

}else{

title.innerText="Nutrició"
t.href="teoria-nutricio.html"
j.href="activitats-nutricio.html"

}

panel.style.transform='scale(1)'
panel.style.opacity='1'

confetti({
particleCount:40,
spread:60,
origin:{y:.8}
})

},250)

}

function goBack(){

const panel=document.getElementById('main-panel')

panel.style.opacity='0'

setTimeout(()=>{

document.getElementById('selection-view').classList.remove('active')
document.getElementById('home-view').classList.add('active')

panel.style.opacity='1'

},250)

}

document.getElementById("confettiBtn").addEventListener("mouseenter",()=>{

confetti({
particleCount:20,
spread:40,
origin:{x:.9,y:.9},
colors:['#5865F2','#ffffff']
})

})

</script>

</body>
</html>
