<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Salut | IE Temple</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary: #2e7d32;
            --discord: #5865F2;
            --glass: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top left, #e8f5e9, #ffffff, #c8e6c9);
            overflow: hidden;
        }

        /* Fons animat */
        .blob {
            position: absolute;
            background: var(--primary);
            filter: blur(100px);
            opacity: 0.1;
            border-radius: 50%;
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move { from { transform: translate(0,0); } to { transform: translate(100px, 100px); } }

        /* Contenidor Principal (Glassmorphism) */
        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.5);
            padding: 50px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 800px;
            text-align: center;
            transition: all 0.4s ease;
        }

        h1 { font-size: 45px; font-weight: 800; color: var(--primary); letter-spacing: -2px; margin-bottom: 10px; }
        .subtitle { font-size: 18px; color: #555; margin-bottom: 40px; }

        /* Navegació */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .card {
            background: white;
            padding: 40px 20px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(46, 125, 50, 0.15);
        }

        .card span { font-size: 50px; margin-bottom: 15px; }
        .card h2 { font-weight: 800; color: #333; }

        /* Botons d'acció (Teoria/Jocs) */
        .btn-action {
            padding: 20px;
            border-radius: 20px;
            border: none;
            color: white;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-teo { background: #1976d2; }
        .btn-joc { background: #ff9800; }
        .btn-back { margin-top: 30px; background: none; border: 1px solid #ccc; padding: 10px 20px; border-radius: 50px; cursor: pointer; color: #888; }

        /* Discord Style Button */
        .discord-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--discord);
            color: white;
            padding: 15px 25px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 20px rgba(88,101,242,0.3);
            transition: 0.2s;
        }
        .discord-btn:hover { border-radius: 10px; transform: scale(1.05); }

        .view { display: none; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="blob" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>

    <div class="container" id="app">
        <div id="home-view" class="view active">
            <h1>Portal de Salut</h1>
            <p class="subtitle">IE Temple · Benvinguts al futur de la biologia</p>
            <div class="grid">
                <button class="card" onclick="showView('digestio')" style="border-bottom: 6px solid #4caf50;">
                    <span>🫃</span>
                    <h2>Digestió</h2>
                </button>
                <button class="card" onclick="showView('nutricio')" style="border-bottom: 6px solid #8bc34a;">
                    <span>🥗</span>
                    <h2>Nutrició</h2>
                </button>
            </div>
        </div>

        <div id="digestio-view" class="view">
            <h1>Digestió</h1>
            <p class="subtitle">Com funciona el teu tub digestiu?</p>
            <div class="grid">
                <a href="timthumb-alt.jpeg" class="btn-action btn-teo">📖 Teoria</a>
                <a href="activitats-digestio.html" class="btn-action btn-joc">🎮 Activitats</a>
            </div>
            <button class="btn-back" onclick="showView('home')">← Tornar al menú</button>
        </div>

        <div id="nutricio-view" class="view">
            <h1>Nutrició</h1>
            <p class="subtitle">Menja sa, viu millor!</p>
            <div class="grid">
                <a href="teoria-nutricio.html" class="btn-action btn-teo">📖 Teoria</a>
                <a href="activitats-nutricio.html" class="btn-action btn-joc">🎮 Activitats</a>
            </div>
            <button class="btn-back" onclick="showView('home')">← Tornar al menú</button>
        </div>
    </div>

    <a href="https://agora.xtec.cat/ietemple/" target="_blank" class="discord-btn" id="instiBtn">
        <span style="font-size: 24px;">🏛️</span>
        Més informació de l'Institut
    </a>

    <script>
        // Funció per canviar de vista sense carregar pàgina
        function showView(name) {
            const app = document.getElementById('app');
            app.style.opacity = "0";
            
            setTimeout(() => {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.getElementById(name + '-view').classList.add('active');
                app.style.opacity = "1";
            }, 200);
        }

        // Efecte confeti al botó de l'insti
        document.getElementById('instiBtn').addEventListener('mouseenter', () => {
            confetti({
                particleCount: 20,
                spread: 30,
                origin: { y: 0.9, x: 0.9 },
                colors: ['#5865F2', '#ffffff']
            });
        });
    </script>
</body>
</html>
