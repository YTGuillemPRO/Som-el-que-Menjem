<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Salut | IE Temple</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #2e7d32; 
            --accent: #1976d2;
            --bg: linear-gradient(135deg, #e8f5e9, #c8e6c9); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: var(--bg); 
        }

        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            max-width: 650px; 
            width: 90%; 
            text-align: center; 
        }

        h1 { color: var(--primary); font-size: 32px; margin-bottom: 30px; }
        
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
        }

        .card { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 30px; 
            border-radius: 20px; 
            color: white; 
            text-decoration: none; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s; 
            border: none; 
        }

        .card:hover { transform: translateY(-5px); filter: brightness(1.1); }
        
        /* Colors */
        .bg-main { background: linear-gradient(135deg, #4caf50, #2e7d32); }
        .bg-teoria { background: linear-gradient(135deg, #2196f3, #1565c0); }
        .bg-activitats { background: linear-gradient(135deg, #ff9800, #ef6c00); }
        
        /* Botó Institut */
        .btn-insti {
            grid-column: 1 / 3;
            background: #f5f5f5;
            color: var(--accent);
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 10px;
            border: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }
        .btn-insti:hover { background: #e3f2fd; border-color: var(--accent); }

        .icon { font-size: 30px; margin-bottom: 5px; }
        .hidden { display: none; }
        
        .btn-tornar { 
            margin-top: 30px; 
            background: none; 
            border: 1px solid #ccc; 
            padding: 10px 20px; 
            border-radius: 50px; 
            cursor: pointer; 
            color: #666; 
        }

        footer { margin-top: 30px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="titol">Portal de Salut</h1>

        <div id="menu-principal" class="grid">
            <div class="card bg-main" onclick="obrir('digestio')">
                <span class="icon">🫃</span>Digestió
            </div>
            <div class="card bg-main" onclick="obrir('nutricio')">
                <span class="icon">🥗</span>Nutrició
            </div>
            
            <a href="https://agora.xtec.cat/ietemple/" target="_blank" class="btn-insti">
                🏛️ Més informació de l'Institut
            </a>
        </div>

        <div id="menu-digestio" class="grid hidden">
            <a href="timthumb-alt.jpeg" class="card bg-teoria"><span class="icon">📖</span>Teoria</a>
            <a href="activitats-digestio.html" class="card bg-activitats"><span class="icon">✏️</span>Activitats</a>
            <div style="grid-column: 1/3"><button class="btn-tornar" onclick="tornar()">← Tornar</button></div>
        </div>

        <div id="menu-nutricio" class="grid hidden">
            <a href="teoria-nutricio.html" class="card bg-teoria"><span class="icon">📚</span>Teoria</a>
            <a href="activitats-nutricio.html" class="card bg-activitats"><span class="icon">🍎</span>Activitats</a>
            <div style="grid-column: 1/3"><button class="btn-tornar" onclick="tornar()">← Tornar</button></div>
        </div>

        <footer>IE Temple - Projecte de Salut 2026</footer>
    </div>

    <script>
        function obrir(seccio) {
            document.getElementById('menu-principal').classList.add('hidden');
            document.getElementById('menu-' + seccio).classList.remove('hidden');
            document.getElementById('titol').innerText = seccio.charAt(0).toUpperCase() + seccio.slice(1);
        }
        function tornar() {
            document.getElementById('menu-principal').classList.remove('hidden');
            document.getElementById('menu-digestio').classList.add('hidden');
            document.getElementById('menu-nutricio').classList.add('hidden');
            document.getElementById('titol').innerText = "Portal de Salut";
        }
    </script>
</body>
</html>
