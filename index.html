<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Salut | IE Temple</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #2e7d32; --disc: #5865F2; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: #e8f5e9; overflow: hidden; }

        .box { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 40px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 90%; max-width: 600px; text-align: center; border: 2px solid white; }
        h1 { font-size: 35px; color: var(--p); margin-bottom: 5px; }
        p { color: #555; margin-bottom: 30px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { padding: 30px 15px; border-radius: 20px; color: white; text-decoration: none; font-weight: 800; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: none; display: flex; flex-direction: column; align-items: center; }
        .btn:hover { transform: translateY(-8px) scale(1.03); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        .dig { background: linear-gradient(135deg, #4caf50, #2e7d32); }
        .nut { background: linear-gradient(135deg, #8bc34a, #558b2f); }
        .teo { background: #1976d2; }
        .act { background: #ff9800; }

        .hidden { display: none; }
        .back { margin-top: 20px; background: none; border: 1px solid #ccc; padding: 10px 20px; border-radius: 50px; cursor: pointer; }

        /* Discord Button */
        .discord-btn { position: fixed; bottom: 20px; right: 20px; background: var(--disc); color: white; padding: 12px 20px; border-radius: 12px; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .discord-btn:hover { border-radius: 5px; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="box">
        <h1 id="t">Ei! Benvingut 👋</h1>
        <p id="s">Què vols aprendre avui sobre el teu cos?</p>

        <div id="m-p" class="grid">
            <button class="btn dig" onclick="go('digestio')"><span style="font-size:40px">🍔</span>La Digestió</button>
            <button class="btn nut" onclick="go('nutricio')"><span style="font-size:40px">🍏</span>Menjar Bé</button>
        </div>

        <div id="m-d" class="grid hidden">
            <a href="timthumb-alt.jpeg" class="btn teo">📖 Teoria</a>
            <a href="activitats-digestio.html" class="btn act">🎮 Jugar!</a>
            <button class="back" style="grid-column: 1/3" onclick="home()">← Enrere</button>
        </div>

        <div id="m-n" class="grid hidden">
            <a href="teoria-nutricio.html" class="btn teo">📖 Teoria</a>
            <a href="activitats-nutricio.html" class="btn act">🎮 Jugar!</a>
            <button class="back" style="grid-column: 1/3" onclick="home()">← Enrere</button>
        </div>
    </div>

    <a href="https://agora.xtec.cat/ietemple/" target="_blank" class="discord-btn">🏛️ L'Insti</a>

    <script>
        function go(s) {
            document.getElementById('m-p').classList.add('hidden');
            document.getElementById('m-' + (s=='digestio'?'d':'n')).classList.remove('hidden');
            document.getElementById('t').innerText = s=='digestio'?'La Digestió':'Menjar Bé';
            document.getElementById('s').innerText = "Tria un joc o aprèn la teoria";
        }
        function home() {
            document.querySelectorAll('.grid').forEach(g => g.classList.add('hidden'));
            document.getElementById('m-p').classList.remove('hidden');
            document.getElementById('t').innerText = "Ei! Benvingut 👋";
            document.getElementById('s').innerText = "Què vols aprendre avui sobre el teu cos?";
        }
    </script>
</body>
</html>
