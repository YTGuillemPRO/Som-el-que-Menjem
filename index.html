<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Salut | IE Temple</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #2e7d32; 
            --discord-color: #5865F2; /* El color oficial de Discord */
            --bg: linear-gradient(135deg, #e8f5e9, #c8e6c9); 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: var(--bg); 
            position: relative;
            overflow: hidden;
        }

        .container { 
            background: white; 
            padding: 50px 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            max-width: 600px; 
            width: 90%; 
            text-align: center; 
            z-index: 1;
        }

        h1 { color: var(--primary); font-size: 34px; margin-bottom: 30px; letter-spacing: -0.5px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .card { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 35px; border-radius: 16px; color: white; 
            text-decoration: none; font-weight: 700; cursor: pointer; 
            transition: all 0.2s ease-in-out; border: none; 
        }

        .card:hover { transform: translateY(-5px); filter: brightness(1.1); border-radius: 12px; }
        
        .bg-main { background: linear-gradient(135deg, #4caf50, #2e7d32); }
        .bg-teoria { background: linear-gradient(135deg, #2196f3, #1565c0); }
        .bg-activitats { background: linear-gradient(135deg, #ff9800, #ef6c00); }
        
        .icon { font-size: 45px; margin-bottom: 15px; }
        .hidden { display: none; }
        
        .btn-tornar { 
            margin-top: 30px; background: #eee; border: none; 
            padding: 12px 25px; border-radius: 8px; cursor: pointer; 
            color: #444; font-weight: 600; transition: 0.2s;
        }
        .btn-tornar:hover { background: #ddd; }

        /* BOTÓ ESTIL DISCORD BAIX A LA DRETA */
        .discord-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: var(--discord-color);
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 16px; /* Més quadrat com Discord */
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
            transition: all 0.2s ease;
            font-size: 14px;
            z-index: 100;
        }

        .discord-btn:hover {
            border-radius: 10px; /* Es torna més quadrat en fer hover, estil Discord */
            box-shadow: 0 8px 20px rgba(88, 101, 242, 0.6);
            transform: translateY(-2px);
        }

        .insti-icon {
            width: 24px;
            height: 24px;
            background: white;
            color: var(--discord-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1 id="titol">Portal de Salut</h1>

        <div id="menu-principal" class="grid">
            <div class="card bg-main" onclick="obrir('digestio')">
                <span class="icon">🫃</span>Digestió
            </div>
            <div class="card bg-main" onclick="obrir('nutricio')">
                <span class="icon">🥗</span>Nutrició
            </div>
        </div>

        <div id="menu-digestio" class="grid hidden">
            <a href="timthumb-alt.jpeg" class="card bg-teoria"><span class="icon">📖</span>Teoria</a>
            <a href="activitats-digestio.html" class="card bg-activitats"><span class="icon">✏️</span>Activitats</a>
            <div style="grid-column: 1/3"><button class="btn-tornar" onclick="tornar()">← Tornar</button></div>
        </div>

        <div id="menu-nutricio" class="grid hidden">
            <a href="teoria-nutricio.html" class="card bg-teoria"><span class="icon">📚</span>Teoria</a>
            <a href="activitats-nutricio.html" class="card bg-activitats"><span class="icon">🍎</span>Activitats</a>
            <div style="grid-column: 1/3"><button class="btn-tornar" onclick="tornar()">← Tornar</button></div>
        </div>
    </div>

    <a href="https://agora.xtec.cat/ietemple/" target="_blank" class="discord-btn">
        <div class="insti-icon">🏛️</div>
        Més informació de l'Institut
    </a>

    <script>
        function obrir(seccio) {
            document.getElementById('menu-principal').classList.add('hidden');
            document.getElementById('menu-' + seccio).classList.remove('hidden');
            document.getElementById('titol').innerText = seccio.charAt(0).toUpperCase() + seccio.slice(1);
        }
        function tornar() {
            document.getElementById('menu-principal').classList.remove('hidden');
            document.getElementById('menu-digestio').classList.add('hidden');
            document.getElementById('menu-nutricio').classList.add('hidden');
            document.getElementById('titol').innerText = "Portal de Salut";
        }
    </script>
</body>
</html>
