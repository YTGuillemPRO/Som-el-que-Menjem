<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faig 2</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<style>
:root{
  --blue:#2563eb;
  --orange:#f59e0b;
  --glass:rgba(255,255,255,0.75);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Plus Jakarta Sans',sans-serif;
}

/* FONDO ANIMADO */
body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(-45deg, #0b1120, #0f172a, #1e293b);
  background-size:400% 400%;
  animation:bgMove 20s infinite;
}

body::before{
  content:"🍔 🍕 🍟 🌮 🍩 🥗 🍗 🧃 🍓 🍪 🍉 🥪 🍇";
  position:fixed;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  font-size:60px;
  opacity:0.5;
  animation:foodMove 25s linear infinite;
  pointer-events:none;
  z-index:0;
}

@keyframes foodMove{
  0%{transform:translate(0,0);}
  100%{transform:translate(-50%,-50%);}
}

@keyframes bgMove{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

/* PANEL */
.glass-panel{
  position:relative;
  z-index:2;
  background:var(--glass);
  backdrop-filter:blur(40px);
  border-radius:40px;
  padding:60px;
  width:90%;
  max-width:900px;
  text-align:center;
  transition:.4s;
}

h1{font-size:50px;}
.subtitle{margin-bottom:40px;color:#555;}

/* GRID */
.main-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:25px;
}

/* CARDS */
.nav-card{
  background:white;
  padding:40px;
  border-radius:25px;
  cursor:pointer;
  transition:.3s;
}

.nav-card:hover{
  transform:translateY(-12px) scale(1.06);
}

.icon-circle{
  font-size:40px;
  margin-bottom:10px;
}

/* VISTAS */
.view{
  display:none;
  opacity:0;
  transform:translateY(30px);
  transition:.4s;
}

.view.active{
  display:block;
  opacity:1;
  transform:translateY(0);
}

/* BOTONES */
.btn-group{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.btn-action{
  padding:20px;
  border-radius:15px;
  color:white;
  font-weight:bold;
  text-decoration:none;
  transition:.3s;
}

.btn-action:hover{
  transform:scale(1.1);
}

.btn-teo{
  background:linear-gradient(135deg,#2563eb,#60a5fa);
}

.btn-joc{
  background:linear-gradient(135deg,#f59e0b,#fbbf24);
}

.back-btn{
  margin-top:30px;
  cursor:pointer;
}

/* BOTÓN INSTI */
.insti-pill{
  position:fixed;
  bottom:30px;
  right:30px;
  background:#5865F2;
  color:white;
  padding:18px 30px;
  border-radius:15px;
  font-weight:700;
  box-shadow:0 10px 40px rgba(88,101,242,.6);
  z-index:999;
  transition:.3s;
}

.insti-pill:hover{
  transform:scale(1.1);
}

/* CONTRIBUYENTES */
.contributors{
  margin-top:60px;
}

.contributor-card{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

.contributor-card img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.contributor-card p{
  font-weight:600;
  color:#333;
}

@media(max-width:700px){
  .main-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="glass-panel" id="main-panel">

<!-- HOME -->
<div id="home-view" class="view active">
  <h1>Quin es el beritable cos del que menjo?</h1>
  <p class="subtitle">Fet per: GUILLEM VARELA I YASSER CHIKHI</p>

  <div class="main-grid">
    <div class="nav-card" onclick="navTo('digestio')">
      <div class="icon-circle">🍔</div>
      <h2>Digestió</h2>
    </div>

    <div class="nav-card" onclick="navTo('nutricio')">
      <div class="icon-circle">🥗</div>
      <h2>Nutrició</h2>
    </div>

    <div class="nav-card" onclick="navTo('xarxa-trofica')" style="grid-column: span 2;">
      <div class="icon-circle">🌿</div>
      <h2>Xarxa tròfica</h2>
    </div>
  </div>

  <!-- CONTRIBUYENTES -->
  <div class="contributors">
    <h2>Col·laboradors externs</h2>

    <div class="contributor-card">
      <img src="https://www.cuerpomente.com/psicologia/que-significa-foto-perfil-que-pones-redes-segun-psicologia_14156" alt="Foto contributor">
      <p>Persona Alexpuig </p>
      <p>Alexa Tarragona </p>
      <p>Arnau Crujera </p>
    </div>
  </div>

</div>

<!-- SELECCIÓN -->
<div id="selection-view" class="view">
  <h1 id="selection-title"></h1>
  <p class="subtitle">Tria una activitat</p>

  <div class="btn-group">
    <a id="link-teoria" class="btn-action btn-teo">📖 Teoria</a>
    <a id="link-joc" class="btn-action btn-joc">🎮 Joc</a>
  </div>

  <div class="back-btn" onclick="goBack()">← Tornar</div>
</div>

</div>

<!-- BOTÓN INSTI -->
<a href="https://agora.xtec.cat/ietemple/" target="_blank" class="insti-pill" id="confettiBtn">
  🏛️ IE Temple
</a>

<script>
const panel = document.getElementById('main-panel');
const link_teoria = document.getElementById('link-teoria');
const link_joc = document.getElementById('link_joc');

function navTo(type){
  panel.style.transform='scale(.95)';
  panel.style.opacity='0';

  setTimeout(()=>{
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById('selection-view').classList.add('active');

    if(type==='digestio'){
      document.getElementById('selection-title').innerText="Digestió";
      link_teoria.href="teoria-digestio.html";
      link_joc.href="activitats-digestio.html";
    }

    else if(type==='nutricio'){
      document.getElementById('selection-title').innerText="Nutrició";
      link_teoria.href="teoria-nutricio.html";
      link_joc.href="activitats-nutricio.html";
    }

    else if(type==='xarxa-trofica'){
      document.getElementById('selection-title').innerText="Xarxa tròfica";
      link_teoria.href="teoria-xarxatrofica.html";
      link_joc.href="activitats-xarxatrofica.html";
    }

    panel.style.transform='scale(1)';
    panel.style.opacity='1';

    confetti({particleCount:50,spread:70,origin:{y:.8}});
  },250);
}

function goBack(){
  panel.style.opacity='0';

  setTimeout(()=>{
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById('home-view').classList.add('active');
    panel.style.opacity='1';
  },250);
}

document.getElementById("confettiBtn").addEventListener("mouseenter",()=>{
  confetti({particleCount:25,spread:40,origin:{x:.9,y:.9}});
});
</script>

</body>
</html>
