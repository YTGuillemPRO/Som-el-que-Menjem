<script>
const panel = document.getElementById('main-panel');

function navTo(type){
  panel.style.transform = 'scale(.95)';
  panel.style.opacity = '0';

  setTimeout(()=>{
    document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));

    if(type==='digestio'){
      document.getElementById('selection-view').classList.add('active');
      document.getElementById('selection-title').innerText="Digestió";
      document.getElementById('link-teoria').href="teoria-digestio.html";
      document.getElementById('link-joc').href="activitats-digestio.html";
    } 
    
    else if(type==='nutricio'){
      document.getElementById('selection-view').classList.add('active');
      document.getElementById('selection-title').innerText="Nutrició";
      document.getElementById('link-teoria').href="teoria-nutricio.html";
      document.getElementById('link-joc').href="activitats-nutricio.html";
    } 
    
    else if(type==='xarxa-trofica'){
      document.getElementById('selection-view').classList.add('active');
      document.getElementById('selection-title').innerText="Xarxa tròfica";
      document.getElementById('link-teoria').href="teoria-xarxatrofica.html";
      document.getElementById('link-joc').href="activitats-xarxatrofica.html";
    }

    panel.style.transform = 'scale(1)';
    panel.style.opacity = '1';

    // 🎉 efecto confetti al entrar
    confetti({
      particleCount:50,
      spread:70,
      origin:{y:.8}
    });

  },250);
}

function goBack(){
  panel.style.opacity='0';

  setTimeout(()=>{
    document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
    document.getElementById('home-view').classList.add('active');
    panel.style.opacity='1';
  },250);
}

/* 🎉 Confetti botón instituto */
document.getElementById("confettiBtn").addEventListener("mouseenter",()=>{
  confetti({
    particleCount:25,
    spread:40,
    origin:{x:.9,y:.9},
    colors:['#5865F2','#ffffff']
  });
});
</script>
