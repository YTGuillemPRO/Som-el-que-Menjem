<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digestión Flow | Minion Run ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <!-- Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <style>
        :root {
            --bg: #0f172a;
            --primary: #3b82f6;
            --success: #2ecc71;
            --error: #e74c3c;
            --neon: #00f2fe;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 30px;
            width: 100%;
            max-width: 650px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        /* Efecto de brillo en el borde */
        .game-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shine 3s infinite;
        }
        @keyframes shine { 0% { left: -100%; } 20% { left: 100%; } 100% { left: 100%; } }

        h1 { font-size: 26px; margin-bottom: 5px; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; }
        .desc { color: #94a3b8; margin-bottom: 20px; font-size: 13px; font-weight: 600; }

        /* --- Tabs --- */
        .tabs {
            display: flex; background: rgba(0,0,0,0.3); border-radius: 14px; padding: 5px;
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05);
        }
        .tab-btn {
            flex: 1; padding: 12px; border: none; background: transparent; color: #64748b;
            font-weight: 800; border-radius: 10px; cursor: pointer; transition: 0.3s; font-size: 13px; text-transform: uppercase;
        }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.5); }
        .mode-container { display: none; animation: slideIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .mode-container.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Mode 1 UI --- */
        .food-status {
            font-size: 50px; margin-bottom: 20px; background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            width: 100px; height: 100px; display: flex; align-items: center; justify-content: center;
            border-radius: 25px; margin-left: auto; margin-right: auto;
            border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .organ-list { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .organ-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);
            color: white; padding: 16px; border-radius: 16px; font-size: 15px; font-weight: 700;
            cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px;
            position: relative; overflow: hidden;
        }
        .organ-btn:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-2px); border-color: rgba(255,255,255,0.2); }
        .organ-btn.correct { background: var(--success); border-color: #fff; pointer-events: none; color: #000; transform: scale(1.02); }
        .organ-btn.wrong { background: var(--error); animation: shake 0.3s; color: white; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        /* --- Mode 2: 3D Container --- */
        #runner-container {
            position: relative; width: 100%; height: 380px;
            background: #000; /* Fallback */
            border-radius: 24px; overflow: hidden; border: 2px solid rgba(255,255,255,0.2);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
            touch-action: none;
        }

        #runner-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(15, 23, 42, 0.8); z-index: 10; backdrop-filter: blur(8px);
            transition: opacity 0.3s;
        }
        
        .hud {
            position: absolute; top: 15px; left: 0; width: 100%; 
            display: flex; justify-content: space-between; padding: 0 25px;
            z-index: 5; pointer-events: none; font-weight: 900; font-size: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .hud-item { 
            background: rgba(0,0,0,0.4); padding: 8px 16px; border-radius: 30px; 
            display: flex; align-items: center; gap: 8px; backdrop-filter: blur(4px); 
            border: 1px solid rgba(255,255,255,0.1);
        }

        .start-btn-game {
            background: linear-gradient(135deg, #FFD700, #FF8C00); color: #2d1b0e; border: none;
            padding: 18px 50px; font-size: 22px; font-weight: 900; border-radius: 60px;
            cursor: pointer; box-shadow: 0 10px 25px rgba(255, 140, 0, 0.4); 
            text-transform: uppercase; letter-spacing: 1px; transition: transform 0.1s;
        }
        .start-btn-game:active { transform: scale(0.95); }
        
        .instructions { 
            margin-top: 20px; font-size: 12px; color: #cbd5e1; 
            background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1);
        }
        .key { color: #FFD700; font-weight: bold; }

        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 20px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--success), #34d399); transition: width 0.5s ease; }
        .back-link { margin-top: 15px; color: #64748b; text-decoration: none; font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="game-card">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchMode('order')">1. Procés</button>
            <button class="tab-btn" onclick="switchMode('runner')">2. Minion Run 3D</button>
        </div>

        <!-- MODE 1 -->
        <div id="mode-order" class="mode-container active">
            <h1>El Camí del Menjar 🌭</h1>
            <p class="desc">Clica els òrgans en l'ordre correcte.</p>
            <div class="food-status" id="food-icon">🌭</div>
            <div class="organ-list">
                <button class="organ-btn" onclick="checkStep(2, this)">Esòfag</button>
                <button class="organ-btn" onclick="checkStep(5, this)">Intestí Gros</button>
                <button class="organ-btn" onclick="checkStep(1, this)">Boca</button>
                <button class="organ-btn" onclick="checkStep(4, this)">Intestí Prim</button>
                <button class="organ-btn" onclick="checkStep(3, this)">Estómac</button>
                <button class="organ-btn" onclick="checkStep(6, this)">Recte / Anus</button>
            </div>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>

        <!-- MODE 2: 3D -->
        <div id="mode-runner" class="mode-container">
            <h1>Carrera Digestiva 3D 🏃</h1>
            <p class="desc">Esquiva tot! Vigues (deslizar), Cajas (saltar) i agafa bananes.</p>
            
            <div id="runner-container">
                <div class="hud">
                    <div class="hud-item"><span style="color:#FFD700">🍌</span> <span id="runner-score">0</span></div>
                    <div class="hud-item" id="lives-display">❤️❤️❤️</div>
                </div>

                <div id="runner-ui">
                    <div style="font-size: 60px; margin-bottom: 10px; filter: drop-shadow(0 0 20px rgba(255,215,0,0.5));">🏃💨</div>
                    <h2 id="runner-title" style="margin-bottom: 25px;">PREPARAT?</h2>
                    <button class="start-btn-game" onclick="start3DGame()">JUGAR AHORA</button>
                    <div class="instructions">
                        <span class="key">←</span> <span class="key">→</span> Mover | 
                        <span class="key">↑</span> Saltar Cajas | 
                        <span class="key">↓</span> Esquivar Vigas
                    </div>
                </div>
            </div>
        </div>

        <a href="index.html" class="back-link">← Abandonar repte</a>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- UI LOGIC ---
        window.switchMode = function(mode) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.mode-container').forEach(c => c.classList.remove('active'));
            document.getElementById('mode-' + mode).classList.add('active');
            if (mode === 'order' && isGameRunning) stopGame();
        };

        // --- MODE 1 LOGIC ---
        window.currentStep = 1;
        const totalSteps = 6;
        const foodIcons = ["🌭", "👄", "⬇️", "🔋", "🧪", "💩", "✨"];

        window.checkStep = function(stepNumber, element) {
            if (stepNumber === window.currentStep) {
                element.classList.add('correct');
                window.currentStep++;
                document.getElementById('food-icon').innerText = foodIcons[window.currentStep-1];
                document.getElementById('progress-fill').style.width = ((window.currentStep-1) / totalSteps * 100) + "%";
                if (window.currentStep > totalSteps) setTimeout(finishGame1, 500);
            } else {
                element.classList.add('wrong');
                setTimeout(() => element.classList.remove('wrong'), 500);
            }
        }
        function finishGame1() {
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, colors: ['#FFD700', '#3b82f6'] });
            const card = document.querySelector('.game-card');
            const tabs = document.querySelector('.tabs').outerHTML;
            card.innerHTML = `${tabs}<div style="padding:40px"><h1 style="font-size:32px;margin-bottom:15px">🏆 EXCELENT!</h1><p style="color:#cbd5e1;margin-bottom:25px">Has completat la digestió.</p><div style="font-size:70px;margin-bottom:25px">🥇</div><button class="start-btn-game" style="width:100%" onclick="window.location.href='index.html'">TORNAR AL INICI</button></div>`;
        }

        // --- MODE 2: 3D RUNNER ULTIMATE ---
        
        let scene, camera, renderer, minion;
        let ground;
        let obstacles = [], bananas = [], particles = [], speedLines = [];
        let animationId, isGameRunning = false;
        
        let score = 0, lives = 3, speed = 0.4;
        const lanes = [-2.5, 0, 2.5];
        let currentLane = 1;
        
        // Physics
        let verticalVelocity = 0, isJumping = false, isSliding = false, slideTimer = 0;
        const GRAVITY = -0.025, JUMP_FORCE = 0.55;
        
        // Invincibility
        let isInvincible = false, invincibleTimer = 0;

        const container = document.getElementById('runner-container');
        const uiLayer = document.getElementById('runner-ui');
        const scoreEl = document.getElementById('runner-score');
        const livesEl = document.getElementById('lives-display');
        const titleEl = document.getElementById('runner-title');

        // --- TEXTURA PROCEDURAL (ASFALTO) ---
        function createAsphaltTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Fondo gris asfalto
            ctx.fillStyle = '#2c2c2c';
            ctx.fillRect(0,0, 512, 512);
            
            // Ruido (grano)
            for(let i=0; i<5000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#333' : '#222';
                ctx.fillRect(Math.random()*512, Math.random()*512, 2, 2);
            }

            // Carriles (Líneas blancas)
            ctx.fillStyle = '#ffffff';
            // Línea central
            for(let z=0; z<512; z+=40) {
                ctx.fillRect(254, z, 4, 20);
            }
            // Líneas laterales
            ctx.fillRect(80, 0, 4, 512);
            ctx.fillRect(428, 0, 4, 512);

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(1, 10); // Repetir en Z
            return texture;
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1e3c72); // Azul oscuro bonito
            scene.fog = new THREE.Fog(0x1e3c72, 20, 80);

            camera = new THREE.PerspectiveCamera(55, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(0, 5, 10);
            camera.lookAt(0, 1, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Luces
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
            dirLight.position.set(10, 25, 10);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 50;
            dirLight.shadow.camera.left = -10;
            dirLight.shadow.camera.right = 10;
            dirLight.shadow.camera.top = 10;
            dirLight.shadow.camera.bottom = -10;
            scene.add(dirLight);

            // Suelo con textura
            const groundGeo = new THREE.PlaneGeometry(100, 1000);
            const groundMat = new THREE.MeshStandardMaterial({ map: createAsphaltTexture() });
            ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.z = -100;
            ground.receiveShadow = true;
            scene.add(ground);

            // Suelo invisible extra para grid de referencia visual (opcional)
            const gridHelper = new THREE.GridHelper(100, 1, 0x000000, 0x000000);
            gridHelper.position.y = 0.02;
            gridHelper.scale.z = 10;
            ground.add(gridHelper);

            createMinion();

            window.addEventListener('resize', onWindowResize, false);
            document.addEventListener('keydown', handleKeyDown);
            container.addEventListener('touchstart', handleTouchStart, {passive: false});
            container.addEventListener('touchend', handleTouchEnd, {passive: false});
        }

        // --- MINION V3 ULTIMATE ---
        function createMinion() {
            minion = new THREE.Group();
            
            // Materiales
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, roughness: 0.2 }); // Más brillante
            const clothMat = new THREE.MeshStandardMaterial({ color: 0x0f2c67 }); // Azul oscuro cool
            const blackMat = new THREE.MeshStandardMaterial({ color: 0x111111 });

            // 1. Cuerpo
            const bodyGeo = new THREE.CylinderGeometry(0.5, 0.45, 1.4, 24);
            const body = new THREE.Mesh(bodyGeo, skinMat);
            body.position.y = 0.9;
            body.castShadow = true;
            minion.add(body);

            // 2. Overol
            const overGeo = new THREE.CylinderGeometry(0.51, 0.51, 0.8, 24);
            const over = new THREE.Mesh(overGeo, clothMat);
            over.position.y = 0.6;
            minion.add(over);

            // POCKET (Bolsillo)
            const pocketGeo = new THREE.BoxGeometry(0.4, 0.3, 0.1);
            const pocket = new THREE.Mesh(pocketGeo, clothMat);
            pocket.position.set(0, 0.6, 0.51);
            minion.add(pocket);

            // LOGO "G"
            const logoGeo = new THREE.CircleGeometry(0.1, 16);
            const logoMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const logo = new THREE.Mesh(logoGeo, logoMat);
            logo.position.set(0, 0.6, 0.56);
            minion.add(logo);

            // 3. Gafas
            const strapGeo = new THREE.TorusGeometry(0.6, 0.06, 8, 32);
            const strap = new THREE.Mesh(strapGeo, blackMat);
            strap.position.set(0, 1.3, 0);
            strap.rotation.y = Math.PI / 2;
            minion.add(strap);

            const eyeGeo = new THREE.SphereGeometry(0.35, 24, 24);
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const eye = new THREE.Mesh(eyeGeo, eyeMat);
            eye.position.set(0, 1.3, 0.45);
            eye.scale.z = 0.5;
            minion.add(eye);

            const
