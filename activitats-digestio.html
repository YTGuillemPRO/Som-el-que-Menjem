<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activitats | Portal de Salut</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ef6c00;
            --bg-gradient: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            --glass: rgba(255, 255, 255, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            padding: 20px;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 { color: var(--primary); margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }

        .quiz-container { text-align: left; margin-top: 20px; }

        .question {
            background: #fdfdfd;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #eee;
            margin-bottom: 20px;
            display: none; /* Amaguem les preguntes per mostrar-les una a una */
        }

        .question.active { display: block; animation: fadeIn 0.5s; }

        .options { display: grid; gap: 10px; margin-top: 15px; }

        button.option {
            padding: 12px 20px;
            border: 2px solid #eee;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
            text-align: left;
        }

        button.option:hover { border-color: var(--primary); background: #fff8f1; }
        
        button.correct { background: #e8f5e9 !important; border-color: #4caf50 !important; color: #2e7d32; }
        button.wrong { background: #ffebee !important; border-color: #f44336 !important; color: #c62828; }

        .score-box { display: none; font-size: 20px; font-weight: 700; color: var(--primary); }

        .btn-nav {
            margin-top: 20px;
            padding: 10px 25px;
            border-radius: 50px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Posa't a prova</h1>
    <p class="subtitle">Demostra el que saps sobre la digestió</p>

    <div class="quiz-container" id="quiz">
        <div class="question active" id="q1">
            <p><strong>1. On comença realment el procés de la digestió?</strong></p>
            <div class="options">
                <button class="option" onclick="check(this, false, 'q1')">A l'estómac</button>
                <button class="option" onclick="check(this, true, 'q1')">A la boca (amb la saliva)</button>
                <button class="option" onclick="check(this, false, 'q1')">A l'intestí prim</button>
            </div>
        </div>

        <div class="question" id="q2">
            <p><strong>2. Quin òrgan s'encarrega d'absorbir la majoria dels nutrients?</strong></p>
            <div class="options">
                <button class="option" onclick="check(this, false, 'q2')">L'intestí gros</button>
                <button class="option" onclick="check(this, true, 'q2')">L'intestí prim</button>
                <button class="option" onclick="check(this, false, 'q2')">L'esòfag</button>
            </div>
        </div>

        <div class="question" id="q3">
            <p><strong>3. Quina és la funció dels sucs gàstrics de l'estómac?</strong></p>
            <div class="options">
                <button class="option" onclick="check(this, true, 'q3')">Descompondre els aliments</button>
                <button class="option" onclick="check(this, false, 'q3')">Refredar el menjar</button>
                <button class="option" onclick="check(this, false, 'q3')">Transportar l'oxigen</button>
            </div>
        </div>

        <div id="result" class="score-box">
            <p>🎉 Felicitats! Has acabat l'activitat.</p>
            <a href="index.html" class="btn-nav" style="margin-top: 20px;">Torna al Menú</a>
        </div>
    </div>
</div>

<script>
    let currentStep = 1;
    const totalQuestions = 3;

    function check(btn, isCorrect, qId) {
        const options = btn.parentElement.querySelectorAll('.option');
        options.forEach(opt => opt.disabled = true);

        if (isCorrect) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
        }

        setTimeout(() => {
            document.getElementById(qId).classList.remove('active');
            currentStep++;
            if (currentStep <= totalQuestions) {
                document.getElementById('q' + currentStep).classList.add('active');
            } else {
                document.getElementById('result').style.display = 'block';
            }
        }, 1000);
    }
</script>

</body>
</html>
