<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digestion Flow | Procés Digestiu</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #0a0f1e;
            --primary: #e8a917;
            --success: #2ecc71;
            --error: #e74c3c;
            --card: rgba(12, 20, 42, 0.85);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow-x: hidden;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(232,169,23,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(30,60,114,0.15) 0%, transparent 50%);
        }
        .game-card {
            background: var(--card);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 28px;
            border-radius: 32px;
            width: 100%;
            max-width: 520px;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
            position: relative;
            overflow: hidden;
        }
        .game-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
            animation: shine 4s infinite;
            pointer-events: none;
        }
        @keyframes shine { 0% { left: -100%; } 15% { left: 100%; } 100% { left: 100%; } }

        h1 { font-size: 24px; margin-bottom: 4px; font-weight: 900; letter-spacing: -0.5px; text-transform: uppercase; }
        .desc { color: #7a8ba5; margin-bottom: 24px; font-size: 13px; font-weight: 600; line-height: 1.5; }

        .food-status {
            font-size: 48px; margin-bottom: 24px;
            background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
            width: 96px; height: 96px; display: flex; align-items: center; justify-content: center;
            border-radius: 26px; margin-left: auto; margin-right: auto;
            border: 1.5px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 30px rgba(0,0,0,0.25);
            transition: transform 0.3s;
        }
        .food-status.pop { animation: pop 0.35s ease; }
        @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.25)} 100%{transform:scale(1)} }

        .organ-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media(max-width: 420px) { .organ-list { grid-template-columns: 1fr; } }

        .organ-btn {
            background: rgba(255, 255, 255, 0.03); border: 1.5px solid rgba(255, 255, 255, 0.06);
            color: #c8d4e0; padding: 16px 10px; border-radius: 16px; font-size: 14px; font-weight: 700;
            cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 0.8px;
            position: relative; overflow: hidden;
        }
        .organ-btn:hover:not(.correct) {
            background: rgba(255, 255, 255, 0.07); transform: translateY(-2px);
            border-color: rgba(255,255,255,0.15); color: #fff;
        }
        .organ-btn.correct {
            background: linear-gradient(135deg, var(--success), #27ae60);
            border-color: rgba(255,255,255,0.3);
            pointer-events: none; color: #fff; transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(46,204,113,0.3);
        }
        .organ-btn.wrong {
            background: var(--error); animation: shake 0.35s; color: white;
            border-color: rgba(255,255,255,0.3);
        }
        @keyframes shake {
            0%,100%{transform:translateX(0)}
            20%{transform:translateX(-8px)}
            40%{transform:translateX(8px)}
            60%{transform:translateX(-5px)}
            80%{transform:translateX(5px)}
        }

        .progress-bar {
            width: 100%; height: 5px; background: rgba(255,255,255,0.06);
            border-radius: 10px; margin-top: 24px; overflow: hidden;
        }
        #progress-fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, var(--success), #34d399);
            transition: width 0.5s ease; border-radius: 10px;
        }

        .step-counter {
            margin-top: 14px; font-size: 12px; color: #4a5a70; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
        }

        .back-link {
            margin-top: 18px; color: #4a5a70; text-decoration: none;
            font-size: 13px; font-weight: 600; transition: color 0.2s; display: inline-block;
        }
        .back-link:hover { color: #8a9bb5; }

        /* Pantalla de victoria */
        .victory { padding: 50px 20px; animation: slideIn 0.5s ease; }
        .victory-icon {
            font-size: 72px; margin-bottom: 16px;
            filter: drop-shadow(0 0 20px rgba(255,215,0,0.4));
        }
        .victory h1 { font-size: 30px; margin-bottom: 8px; color: var(--primary); }
        .victory p { color: #8a9bb5; margin-bottom: 28px; font-size: 15px; }
        .replay-btn {
            background: linear-gradient(135deg, #FFD700, #FF9500); color: #2d1b0e;
            border: none; padding: 16px 50px; font-size: 18px; font-weight: 900;
            border-radius: 60px; cursor: pointer;
            box-shadow: 0 8px 25px rgba(255,149,0,0.35);
            text-transform: uppercase; letter-spacing: 1px; transition: transform 0.1s;
        }
        .replay-btn:active { transform: scale(0.95); }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="game-card" id="game-card">
        <h1>El Cami del Menjar</h1>
        <p class="desc">Clica els organs en l'ordre correcte del recorregut digestiu.</p>
        <div class="food-status" id="food-icon">🌭</div>
        <div class="organ-list" id="organ-list">
            <button class="organ-btn" data-step="2">Esofag</button>
            <button class="organ-btn" data-step="5">Intesti Gros</button>
            <button class="organ-btn" data-step="1">Boca</button>
            <button class="organ-btn" data-step="4">Intesti Prim</button>
            <button class="organ-btn" data-step="3">Estomac</button>
            <button class="organ-btn" data-step="6">Recte / Anus</button>
        </div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div class="step-counter" id="step-counter">Pas 1 de 6</div>
        <a href="index.html" class="back-link">← Tornar al inici</a>
    </div>

    <script>
        let currentStep = 1;
        const totalSteps = 6;
        const foodIcons = ["🌭", "👄", "⬇️", "🔄", "🧪", "💩", "✅"];

        const organListEl = document.getElementById('organ-list');
        const foodIconEl = document.getElementById('food-icon');
        const progressFill = document.getElementById('progress-fill');
        const stepCounterEl = document.getElementById('step-counter');
        const gameCard = document.getElementById('game-card');

        organListEl.addEventListener('click', e => {
            const btn = e.target.closest('.organ-btn');
            if (!btn || btn.classList.contains('correct')) return;

            const step = parseInt(btn.dataset.step);

            if (step === currentStep) {
                btn.classList.add('correct');
                currentStep++;
                foodIconEl.innerText = foodIcons[currentStep - 1];
                foodIconEl.classList.remove('pop');
                void foodIconEl.offsetWidth; // Forzar reflow
                foodIconEl.classList.add('pop');
                progressFill.style.width = ((currentStep - 1) / totalSteps * 100) + '%';
                stepCounterEl.textContent = `Pas ${Math.min(currentStep, totalSteps)} de ${totalSteps}`;

                if (currentStep > totalSteps) {
                    setTimeout(showVictory, 600);
                }
            } else {
                btn.classList.add('wrong');
                setTimeout(() => btn.classList.remove('wrong'), 400);
            }
        });

        function showVictory() {
            confetti({
                particleCount: 250, spread: 110, origin: { y: 0.6 },
                colors: ['#FFD700', '#e8a917', '#2ecc71', '#34d399']
            });
            setTimeout(() => {
                gameCard.innerHTML = `
                    <div class="victory">
                        <div class="victory-icon">🏆</div>
                        <h1>EXCELENT</h1>
                        <p>Has completat el recorregut digestiu correctament.</p>
                        <button class="replay-btn" onclick="location.reload()">TORNAR A JUGAR</button>
                        <br><br>
                        <a href="index.html" class="back-link">← Tornar al inici</a>
                    </div>`;
            }, 350);
        }
    </script>
</body>
</html>
