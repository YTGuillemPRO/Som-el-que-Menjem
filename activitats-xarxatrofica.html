<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Actividades Red Trófica</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
}

section {
  margin-bottom: 40px;
  padding: 20px;
  border: 2px solid #ccc;
  border-radius: 10px;
}

h2 {
  color: darkgreen;
}

/* Drag & Drop */
.container { display: flex; gap: 20px; }
.box {
  border: 2px dashed #999;
  padding: 20px;
  width: 150px;
  min-height: 100px;
}
.item {
  padding: 10px;
  background: lightgreen;
  margin: 5px;
  cursor: grab;
}

/* Botones */
button {
  margin: 5px;
  padding: 8px 12px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🌍 Actividades sobre la Red Trófica</h1>

<!-- 1. Drag & Drop -->
<section>
<h2>1. Clasifica los organismos</h2>

<div class="container">
  <div class="box" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h3>Productores</h3>
  </div>
  <div class="box" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h3>Consumidores</h3>
  </div>
</div>

<div>
  <div class="item" draggable="true" ondragstart="drag(event)" id="planta">🌱 Planta</div>
  <div class="item" draggable="true" ondragstart="drag(event)" id="conejo">🐰 Conejo</div>
</div>
</section>

<!-- 2. Quiz -->
<section>
<h2>2. Quiz</h2>

<p>¿Quién es un consumidor primario?</p>

<button onclick="respuesta('incorrecta')">León</button>
<button onclick="respuesta('correcta')">Conejo</button>
<button onclick="respuesta('incorrecta')">Águila</button>

<p id="quizResultado"></p>
</section>

<!-- 3. Completar -->
<section>
<h2>3. Completa la cadena</h2>

<p>Planta → ______ → Zorro</p>

<input type="text" id="respuestaInput">
<button onclick="verificar()">Verificar</button>

<p id="resultadoCadena"></p>
</section>

<!-- 4. Info interactiva -->
<section>
<h2>4. Haz clic en un organismo</h2>

<button onclick="info('productor')">🌱 Planta</button>
<button onclick="info('herbivoro')">🐰 Conejo</button>
<button onclick="info('carnivoro')">🦊 Zorro</button>

<p id="infoTexto"></p>
</section>

<script>
// Drag & Drop
function allowDrop(ev) {
  ev.preventDefault();
}

function drag(ev) {
  ev.dataTransfer.setData("text", ev.target.id);
}

function drop(ev) {
  ev.preventDefault();
  const data = ev.dataTransfer.getData("text");
  ev.target.appendChild(document.getElementById(data));
}

// Quiz
function respuesta(tipo) {
  if (tipo === 'correcta') {
    document.getElementById("quizResultado").innerText = "¡Correcto!";
  } else {
    document.getElementById("quizResultado").innerText = "Intenta otra vez.";
  }
}

// Completar cadena
function verificar() {
  const resp = document.getElementById("respuestaInput").value.toLowerCase();
  if (resp === "conejo") {
    document.getElementById("resultadoCadena").innerText = "¡Correcto!";
  } else {
    document.getElementById("resultadoCadena").innerText = "Incorrecto";
  }
}

// Info interactiva
function info(tipo) {
  let texto = "";
  
  if (tipo === "productor") {
    texto = "Produce su propio alimento.";
  } else if (tipo === "herbivoro") {
    texto = "Se alimenta de plantas.";
  } else {
    texto = "Se alimenta de otros animales.";
  }

  document.getElementById("infoTexto").innerText = texto;
}
</script>

</body>
</html>
