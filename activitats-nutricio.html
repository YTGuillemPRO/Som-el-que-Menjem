<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutri-Dash | IE Temple</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(255, 255, 255, 0.05);
            --green: #2ecc71;
            --red: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
        }

        .game-container {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .score-board {
            font-size: 18px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        #food-display {
            font-size: 120px;
            margin: 30px 0;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn {
            padding: 20px;
            border-radius: 24px;
            border: none;
            font-size: 24px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .btn span { font-size: 14px; opacity: 0.8; font-weight: 400; }

        .btn-yes { background: var(--green); box-shadow: 0 10px 20px rgba(46, 204, 113, 0.2); }
        .btn-no { background: var(--red); box-shadow: 0 10px 20px rgba(231, 76, 60, 0.2); }

        .btn:hover { transform: translateY(-5px); filter: brightness(1.1); }
        .btn:active { transform: scale(0.95); }

        .feedback {
            position: fixed;
            top: 20%;
            font-size: 40px;
            font-weight: 800;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .show-feedback { opacity: 1; transform: translateY(-20px); }

        .back-btn {
            margin-top: 30px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }
        .back-btn:hover { color: white; }
    </style>
</head>
<body>

    <div id="fb" class="feedback"></div>

    <div class="game-container">
        <div class="score-board">Punts: <span id="points">0</span> | Ronda: <span id="round">1</span>/10</div>
        
        <div id="food-display">🥦</div>

        <div class="controls">
            <button class="btn btn-yes" onclick="answer(true)">
                ✅ SÍ
                <span>És saludable</span>
            </button>
            <button class="btn btn-no" onclick="answer(false)">
                ❌ NO
                <span>No és sa</span>
            </button>
        </div>
    </div>

    <a href="index.html" class="back-btn">← Sortir del joc</a>

    <script>
        const foods = [
            { e: '🥦', h: true }, { e: '🍩', h: false }, { e: '🍎', h: true },
            { e: '🍟', h: false }, { e: '🥑', h: true }, { e: '🍕', h: false },
            { e: '🥗', h: true }, { e: '🍭', h: false }, { e: '🥚', h: true },
            { e: '🥓', h: false }, { e: '🍌', h: true }, { e: '🍔', h: false }
        ];

        // Barrejar aliments perquè no surtin sempre igual
        foods.sort(() => Math.random() - 0.5);

        let points = 0;
        let currentRound = 0;
        const totalRounds = 10;

        function updateDisplay() {
            if (currentRound < totalRounds) {
                const display = document.getElementById('food-display');
                display.style.transform = "scale(0)";
                setTimeout(() => {
                    display.innerText = foods[currentRound].e;
                    display.style.transform = "scale(1)";
                }, 150);
                document.getElementById('round').innerText = currentRound + 1;
            } else {
                endGame();
            }
        }

        function answer(userChoice) {
            const correct = foods[currentRound].h === userChoice;
            const fb = document.getElementById('fb');
            
            if (correct) {
                points += 10;
                fb.innerText = "MOLT BÉ! ✨";
                fb.style.color = "var(--green)";
                document.getElementById('points').innerText = points;
            } else {
                fb.innerText = "ERROR! ❌";
                fb.style.color = "var(--red)";
            }

            fb.classList.add('show-feedback');
            setTimeout(() => fb.classList.remove('show-feedback'), 500);

            currentRound++;
            updateDisplay();
        }

        function endGame() {
            const container = document.querySelector('.game-container');
            let message = points >= 80 ? "Ets un expert en nutrició! 🏆" : "Has d'estudiar una mica més! 📚";
            
            container.innerHTML = `
                <h1 style="font-size:40px; margin-bottom:20px;">Final!</h1>
                <p style="font-size:24px; margin-bottom:10px;">Puntuació total:</p>
                <div style="font-size:60px; font-weight:800; color:var(--green); margin-bottom:20px;">${points}</div>
                <p style="margin-bottom:30px; color:#94a3b8;">${message}</p>
                <button class="btn btn-yes" style="width:100%" onclick="window.location.href='index.html'">TORNAR AL MENÚ</button>
            `;
            
            if(points >= 80) confetti({ particleCount: 150, spread: 70 });
        }

        // Inicialitzar
        updateDisplay();
    </script>
</body>
</html>
