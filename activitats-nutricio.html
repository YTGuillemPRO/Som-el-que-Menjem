<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Nutri-Dash App</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --primary: #00e676;
            --danger: #ff3d00;
            --gold: #ffea00;
            --text: #ffffff;
            --accent: #2979ff;
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
        
        body{
            font-family:'Plus Jakarta Sans', sans-serif;
            background:var(--bg);color:var(--text);
            height:100vh;height:100dvh;
            overflow:hidden;position:fixed;inset:0;
        }

        /* === LAYOUT GENERAL === */
        .app-view{
            position:absolute;inset:0;
            display:flex;flex-direction:column;
            background:var(--bg);z-index:10;
            transition:transform 0.3s ease, opacity 0.3s;
        }
        .view-hidden{transform:translateY(20px);opacity:0;pointer-events:none;z-index:0;}
        .active-view{transform:translateY(0);opacity:1;pointer-events:auto;z-index:10;}

        /* === MENÚ PRINCIPAL === */
        .app-header{padding:20px 20px 10px;background:linear-gradient(to bottom, #000, transparent);z-index:20;}
        .app-logo{font-size:14px;color:var(--primary);font-weight:900;letter-spacing:1px;margin-bottom:5px}
        .app-title{font-size:28px;font-weight:900;color:#fff}

        .scroll-list{flex:1;overflow-y:auto;padding:10px 20px 80px;-webkit-overflow-scrolling:touch; touch-action: pan-y;}
        .scroll-list::-webkit-scrollbar{width:3px}
        .scroll-list::-webkit-scrollbar-thumb{background:#333;border-radius:10px}

        /* CANVI: Utilitzem button per assegurar clic en mòbils */
        .menu-btn-large{
            display:flex;align-items:center;gap:20px;
            background:#1a1a1a;border:1px solid #333;
            padding:20px;border-radius:20px;margin-bottom:15px;
            position:relative;overflow:hidden;
            box-shadow:0 4px 10px rgba(0,0,0,0.3);
            transition:transform 0.1s, background 0.2s;
            cursor:pointer; width:100%; text-align:left; color:#fff; font-family:inherit; font-size:inherit;
        }
        .menu-btn-large:active{transform:scale(0.98);background:#222}
        .menu-icon-wrap{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
        .bg-green{background:rgba(0,230,118,0.15);color:var(--primary)}
        .bg-gold{background:rgba(255,234,0,0.15);color:var(--gold)}
        .bg-grey{background:rgba(255,255,255,0.05);color:#888}
        .menu-txt h3{font-size:18px;font-weight:800}
        .menu-txt p{font-size:13px;color:#888;margin-top:2px}
        .chevron{margin-left:auto;color:#444;font-size:12px}

        /* === QUIZ UI === */
        .quiz-container{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:30px;text-align:center;}
        .food-card{width:100%;max-width:320px;background:#1a1a1a;border-radius:24px;padding:40px 20px;margin-bottom:30px;border:1px solid rgba(255,255,255,0.05);box-shadow:0 10px 30px rgba(0,0,0,0.5);position:relative;}
        .food-emoji{font-size:100px;display:block;margin-bottom:15px;animation:pop 0.4s cubic-bezier(0.175,0.885,0.32,1.275)}
        @keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.1)}100%{transform:scale(1)}}
        .quiz-ctrls{display:flex;gap:15px;width:100%;max-width:320px}
        .q-btn{
            flex:1;height:100px;border-radius:20px;border:none;
            font-size:20px;font-weight:900;color:#fff;
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            gap:5px;box-shadow:0 8px 0 rgba(0,0,0,0.3);
            transition:transform 0.1s, box-shadow 0.1s; cursor:pointer;
        }
        .q-btn:active{transform:translateY(4px);box-shadow:0 4px 0 rgba(0,0,0,0.3)}
        .btn-yes{background:var(--primary);color:#000}
        .btn-no{background:var(--danger)}
        .q-label{font-size:12px;opacity:0.7;font-weight:400;text-transform:uppercase}

        /* === RUNNER UI (MINION RUSH STYLE) === */
        .runner-game{
            position:absolute;inset:0;
            background:linear-gradient(to bottom, #050510 0%, #0a0a20 40%, #000 100%);
            overflow:hidden; touch-action:none; /* Bloqueja scroll només aqui */
            z-index:1;
        }
        
        /* Pista visual 3D */
        .track-visual{
            position:absolute;bottom:0;left:0;right:0;height:75%;
            clip-path:polygon(40% 0%, 60% 0%, 100% 100%, 0% 100%);
            background:linear-gradient(to bottom, #111 0%, #1a1a1a 100%);
            z-index:2;
        }
        .track-line{position:absolute;bottom:0;height:100%;background:rgba(255,255,255,0.1);width:2px;z-index:3;}
        .line-l{left:0%;transform-origin:bottom center;transform:rotate(18deg);}
        .line-r{right:0%;transform-origin:bottom center;transform:rotate(-18deg);}
        .line-c1{left:50%;transform:translateX(-50%) rotate(6deg);transform-origin:bottom center;}
        .line-c2{left:50%;transform:translateX(-50%) rotate(-6deg);transform-origin:bottom center;}

        .road-grid{
            position:absolute;bottom:-50%;left:0;right:0;height:100%;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size:100% 100px; 
            transform-origin:bottom center;
            transform:perspective(500px) rotateX(60deg);
            animation:moveRoad 0.3s linear infinite; z-index:2;
            clip-path:polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
        }
        @keyframes moveRoad{from{background-position:0 0}to{background-position:0 100px}}

        /* EL JUGADOR */
        .player-container{
            position:absolute;bottom:15%;left:50%;transform:translateX(-50%);
            width:80px;height:80px;z-index:50;
            transition:left 0.15s cubic-bezier(0.2, 0.8, 0.2, 1);
            display:flex;justify-content:center;align-items:flex-end;
        }
        .minion-sprite{
            font-size:60px;
            filter:drop-shadow(0 15px 10px rgba(0,0,0,0.6));
            animation: runBob 0.3s ease-in-out infinite;
            transition: transform 0.15s ease-out;
            transform-origin: bottom center;
        }
        @keyframes runBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        
        .player-jump .minion-sprite{ animation:none; transform:translateY(-110px) scaleX(0.85) scaleY(1.2); }
        .player-slide .minion-sprite{ animation:none; transform:translateY(20px) scaleX(1.3) scaleY(0.4); }

        /* OBSTACLES 3D */
        .obstacle-3d{
            position:absolute;top:0;left:0;
            display:flex;align-items:center;justify-content:center;
            pointer-events:none; will-change:transform, opacity;
            transition:opacity 0.1s;
        }
        .obs-hit{ opacity:0 !important; transform:translate(-50%, -50%) scale(2) !important; }

        /* HUD RUNNER */
        .runner-hud{
            position:absolute;top:20px;left:0;right:0;
            display:flex;justify-content:space-between;padding:0 20px;
            z-index:100;pointer-events:none;
        }
        .hud-stat{
            background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);
            padding:8px 16px;border-radius:20px;
            border:1px solid rgba(255,255,255,0.1);
            font-weight:800;font-size:16px;
            display:flex;align-items:center;gap:8px;
        }

        /* OVERLAYS JOCS */
        .game-overlay{
            position:absolute;inset:0;z-index:300;
            background:rgba(0,0,0,0.85);backdrop-filter:blur(5px);
            display:flex;flex-direction:column;justify-content:center;align-items:center;
            padding:40px;text-align:center;
        }

        /* UTILS */
        .full-btn{
            background:#fff;color:#000;border:none;
            padding:18px 40px;border-radius:50px;
            font-size:18px;font-weight:900;font-family:inherit;
            width:100%;max-width:300px;margin-bottom:15px;
            box-shadow:0 0 20px rgba(255,255,255,0.2); cursor:pointer;
        }
        .icon-btn{background:none;border:none;color:#fff;font-size:30px;margin-top:20px;cursor:pointer; padding:10px;}
        .txt-big{font-size:40px;font-weight:900;margin-bottom:10px;display:block}

    </style>
</head>
<body>

<!-- === PANTALLA 1: MENÚ === -->
<div id="viewMenu" class="app-view active-view">
    <div class="app-header">
        <div class="app-logo">NUTRI • DASH</div>
        <h1 class="app-title">Benvingut</h1>
    </div>
    
    <div class="scroll-list">
        <!-- Botons canviats a <button> per evitar problemes de clic a iOS/Android -->
        <button class="menu-btn-large" onclick="nav.to('quiz')">
            <div class="menu-icon-wrap bg-green"><i class="fa-solid fa-brain"></i></div>
            <div class="menu-txt"><h3>Mode Preguntes</h3><p>Ràpid, mental i adictiu.</p></div>
            <i class="fa-solid fa-chevron-right chevron"></i>
        </button>

        <button class="menu-btn-large" onclick="nav.to('runner')">
            <div class="menu-icon-wrap bg-gold"><i class="fa-solid fa-bolt"></i></div>
            <div class="menu-txt"><h3>Mode Carrera</h3><p>Minion Run: Córrer i esquivar.</p></div>
            <i class="fa-solid fa-chevron-right chevron"></i>
        </button>

        <div style="height:1px;background:#222;margin:10px 0"></div>

        <button class="menu-btn-large" onclick="alert('Aquí anirà el rànquing online!')">
            <div class="menu-icon-wrap bg-grey"><i class="fa-solid fa-trophy"></i></div>
            <div class="menu-txt"><h3>Rànquing</h3><p>Millors jugadors mundials.</p></div>
            <i class="fa-solid fa-lock chevron"></i>
        </button>
        
        <button class="menu-btn-large" onclick="alert('Desenvolupat per AI Team 2024')">
            <div class="menu-icon-wrap bg-grey"><i class="fa-solid fa-info"></i></div>
            <div class="menu-txt"><h3>Sobre l'App</h3><p>Versió 2.0.1</p></div>
        </button>
    </div>
</div>

<!-- === PANTALLA 2: QUIZ === -->
<div id="viewQuiz" class="app-view view-hidden">
    <div style="padding:15px;display:flex;align-items:center">
        <button class="icon-btn" onclick="nav.to('menu')"><i class="fa-solid fa-arrow-left"></i></button>
        <span style="margin-left:auto;font-weight:900;color:var(--primary)">PUNTS: <span id="qScoreVal">0</span></span>
    </div>
    <div class="quiz-container">
        <div class="food-card">
            <span id="qEmoji" class="food-emoji">🍎</span>
            <h2 id="qName" style="color:#fff;margin-bottom:10px">Poma</h2>
            <p style="color:#888;font-size:14px">És saludable?</p>
        </div>
        <div class="quiz-ctrls">
            <button class="q-btn btn-yes" onclick="quiz.ans(true)"><i class="fa-solid fa-check"></i> <span class="q-label">SÍ</span></button>
            <button class="q-btn btn-no" onclick="quiz.ans(false)"><i class="fa-solid fa-xmark"></i> <span class="q-label">NO</span></button>
        </div>
    </div>
</div>

<!-- === PANTALLA 3: RUNNER (MINION RUSH) === -->
<div id="viewRunner" class="app-view view-hidden">
    
    <div id="runnerGameArea" class="runner-game">
        <div class="road-grid"></div>
        <div class="track-visual"></div>
        <div class="track-line line-l"></div>
        <div class="track-line line-r"></div>
        <div class="track-line line-c1"></div>
        <div class="track-line line-c2"></div>
        
        <div class="runner-hud">
            <div class="hud-stat" style="color:var(--gold)"><i class="fa-solid fa-star"></i> <span id="rScore">0</span></div>
            <div class="hud-stat" style="color:var(--danger)"><span id="rLives">❤️❤️❤️</span></div>
        </div>

        <div class="player-container" id="player">
            <div class="minion-sprite">🏃</div>
        </div>
    </div>

    <div id="runnerOverlay" class="game-overlay">
        <div style="font-size:60px;margin-bottom:20px">🏃</div>
        <h2 style="margin-bottom:10px">MINION RUN</h2>
        <p style="color:#888; margin-bottom:30px; font-size:14px">Llisca per moure't, saltar i ajupir-te!<br>O fes servir les fletxes del teclat.</p>
        <button class="full-btn" onclick="runner.start()">CÓRRER</button>
        <button class="icon-btn" onclick="nav.to('menu')"><i class="fa-solid fa-times"></i></button>
    </div>

    <div id="runnerGameOver" class="game-overlay" style="display:none">
        <span class="txt-big" style="color:var(--danger)">GAME OVER</span>
        <p style="color:#888;margin-bottom:10px">Puntuació Final</p>
        <h1 class="txt-big" id="finalRScore" style="color:var(--gold)">0</h1>
        <button class="full-btn" onclick="runner.start()">TORNAR-HO A PROVAR</button>
        <button class="icon-btn" onclick="nav.to('menu')"><i class="fa-solid fa-house"></i></button>
    </div>
</div>

<script>
// --- AUDIO ---
const Aud = {
    ctx: null,
    init: function(){ if(!this.ctx) this.ctx = new(window.AudioContext||window.webkitAudioContext)(); if(this.ctx.state==='suspended') this.ctx.resume(); },
    t: function(f, type, d, v=0.1){ if(!this.ctx)return; const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.type=type; o.frequency.value=f; g.gain.setValueAtTime(v, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime+d); o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime+d); },
    click: function(){ this.init(); this.t(800, 'sine', 0.05); },
    coin: function(){ this.init(); this.t(1200, 'sine', 0.1); setTimeout(()=>this.t(1800, 'sine', 0.1), 50); },
    hit: function(){ this.init(); this.t(100, 'sawtooth', 0.3, 0.2); },
    jump: function(){ this.init(); this.t(400, 'triangle', 0.1); },
    slide: function(){ this.init(); this.t(150, 'sawtooth', 0.1, 0.05); }
};

// --- NAVEGACIÓ ---
const nav = {
    to: function(viewId) {
        Aud.click();
        document.querySelectorAll('.app-view').forEach(v => {
            v.classList.remove('active-view');
            v.classList.add('view-hidden');
        });
        const target = document.getElementById('view'+viewId.charAt(0).toUpperCase()+viewId.slice(1));
        if(target) {
            target.classList.remove('view-hidden');
            void target.offsetWidth; // Força reflow
            target.classList.add('active-view');
        }
        
        if(viewId === 'quiz') quiz.init();
        if(viewId !== 'runner') runner.stop();
    }
};

// --- JOC 1: QUIZ ---
const foods=[{e:'🥦',n:'Broquil',g:1},{e:'🍎',n:'Poma',g:1},{e:'🥑',n:'Alvocat',g:1},{e:'🍗',n:'Pollastre',g:1},{e:'🍩',n:'Donut',g:0},{e:'🍔',n:'Hamburguesa',g:0},{e:'🍟',n:'Patates',g:0},{e:'🍕',n:'Pizza',g:0},{e:'🍇',n:'Raim',g:1},{e:'🍓',n:'Maduixa',g:1},{e:'🧁',n:'Pastis',g:0},{e:'🥤',n:'Refresc',g:0}];
const quiz = {
    active: false, score:0,
    init: function(){ this.active=true; this.score=0; document.getElementById('qScoreVal').innerText='0'; this.loadFood(); },
    loadFood: function(){
        const f = foods[Math.floor(Math.random()*foods.length)];
        this.currentFood = f;
        document.getElementById('qEmoji').innerText=f.e;
        document.getElementById('qName').innerText=f.n;
    },
    ans: function(yes){
        if(!this.active) return;
        Aud.init();
        const correct = (yes && this.currentFood.g) || (!yes && !this.currentFood.g);
        if(correct){ this.score += 10; Aud.coin(); } else { this.score = Math.max(0, this.score - 5); Aud.hit(); }
        document.getElementById('qScoreVal').innerText = this.score;
        
        const el = document.getElementById('qEmoji');
        el.style.transform='scale(0)';
        setTimeout(()=>{ el.style.transform='scale(1)'; this.loadFood(); }, 150);
    }
};

// --- JOC 2: RUNNER (MINION RUSH STYLE) ---
const runner = {
    active: false, score:0, lives:3, lane:1, speed:0.015, objects:[], animId: null, spawnTimer: 0,
    playerState: 'run',
    
    project: function(lane, z) {
        const vpX = window.innerWidth / 2;
        const vpY = window.innerHeight * 0.35; 
        const baseY = window.innerHeight * 0.85; 
        const laneOffsets = [-0.25, 0, 0.25]; 
        const baseX = vpX + laneOffsets[lane] * window.innerWidth;
        const depth = Math.pow(z, 1.5); 
        const x = vpX + (baseX - vpX) * depth;
        const y = vpY + (baseY - vpY) * depth;
        const scale = Math.pow(z, 2) * 1.5;
        return { x, y, scale };
    },

    start: function(){
        Aud.init();
        this.active=true; this.score=0; this.lives=3; this.lane=1; this.speed=0.015; this.objects=[]; this.spawnTimer=0;
        this.playerState = 'run';
        
        document.getElementById('runnerOverlay').style.display='none';
        document.getElementById('runnerGameOver').style.display='none';
        document.querySelectorAll('.obstacle-3d').forEach(e=>e.remove());
        
        const p = document.getElementById('player');
        p.style.left = '50%';
        p.className = 'player-container';
        
        this.updateHUD();
        this.loop();
    },
    
    stop: function(){ this.active=false; if(this.animId) cancelAnimationFrame(this.animId); },
    
    moveLane: function(dir){
        if(!this.active) return;
        Aud.jump();
        if(dir==='left' && this.lane > 0) this.lane--;
        if(dir==='right' && this.lane < 2) this.lane++;
        const positions = ['25%', '50%', '75%'];
        document.getElementById('player').style.left = positions[this.lane];
    },

    jump: function(){
        if(!this.active || this.playerState !== 'run') return;
        this.playerState = 'jump';
        const p = document.getElementById('player');
        p.classList.add('player-jump');
        setTimeout(() => { p.classList.remove('player-jump'); this.playerState = 'run'; }, 500);
    },

    slide: function(){
        if(!this.active || this.playerState !== 'run') return;
        this.playerState = 'slide';
        const p = document.getElementById('player');
        p.classList.add('player-slide');
        Aud.slide();
        setTimeout(() => { p.classList.remove('player-slide'); this.playerState = 'run'; }, 600);
    },

    spawn: function(){
        const lane = Math.floor(Math.random()*3);
        const rand = Math.random();
        let type, emoji;
        if(rand < 0.3) { type='coin'; emoji='🍌'; }
        else if(rand < 0.6) { type='low'; emoji='🪵'; } 
        else if(rand < 0.8) { type='high'; emoji='🍩'; } 
        else { type='lane'; emoji='🍔'; } 
        
        const el = document.createElement('div');
        el.className='obstacle-3d';
        el.innerText=emoji;
        document.getElementById('runnerGameArea').appendChild(el);
        this.objects.push({ el, z: 0, lane, type, hit: false });
    },

    loop: function(){
        if(!this.active) return;
        this.animId = requestAnimationFrame(()=>this.loop());
        
        if(this.speed < 0.04) this.speed += 0.000005;
        this.score += Math.floor(this.speed * 10);
        this.updateHUD();
        
        this.spawnTimer += this.speed;
        if(this.spawnTimer > 0.8) { this.spawn(); this.spawnTimer = 0; }

        for(let i=this.objects.length-1; i>=0; i--){
            let o = this.objects[i];
            o.z += this.speed; 
            
            if(o.z > 1.2){
                o.el.remove();
                this.objects.splice(i,1);
                continue;
            }
            
            const proj = this.project(o.lane, o.z);
            o.el.style.left = proj.x + 'px';
            o.el.style.top = proj.y + 'px';
            o.el.style.transform = `translate(-50%, -50%) scale(${proj.scale})`;
            o.el.style.zIndex = Math.floor(o.z * 100);
            o.el.style.fontSize = (30 * proj.scale) + 'px';

            if(!o.hit && o.z > 0.82 && o.z < 0.95 && o.lane === this.lane){
                let isColliding = false;
                if(o.type === 'coin') { this.score += 50; Aud.coin(); o.hit=true; o.el.classList.add('obs-hit'); } 
                else if(o.type === 'lane') { isColliding = true; }
                else if(o.type === 'low' && this.playerState !== 'jump') { isColliding = true; }
                else if(o.type === 'high' && this.playerState !== 'slide') { isColliding = true; }
                
                if(isColliding) { o.hit = true; this.registerHit(o); }
            }
        }
    },

    registerHit: function(o){
        this.lives--;
        Aud.hit();
        if(navigator.vibrate) navigator.vibrate(200);
        o.el.classList.add('obs-hit'); 
        this.updateHUD();
        const area = document.getElementById('runnerGameArea');
        area.style.boxShadow = 'inset 0 0 50px rgba(255,0,0,0.5)';
        setTimeout(()=> area.style.boxShadow = 'none', 200);
        if(this.lives <= 0) this.gameOver();
    },

    updateHUD: function(){
        document.getElementById('rScore').innerText = this.score;
        document.getElementById('rLives').innerText = '❤️'.repeat(Math.max(0, this.lives));
    },

    gameOver: function(){
        this.stop();
        document.getElementById('finalRScore').innerText = this.score;
        document.getElementById('runnerGameOver').style.display='flex';
        if(this.score > 500) confetti({ particles: 100, spread: 70, origin: { y: 0.6 } });
    }
};

// --- GESTOS TOUCH (SWIPE) ---
let touchStartX = 0, touchStartY = 0;

document.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
}, {passive: true});

document.addEventListener('touchend', e => {
    if(!runner.active) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);
    
    if(Math.max(absDx, absDy) > 30) {
        if(absDx > absDy) {
            if(dx > 0) runner.moveLane('right'); else runner.moveLane('left');
        } else {
            if(dy < 0) runner.jump(); else runner.slide();
        }
    }
}, {passive: true});

// --- CONTROLS DE TECLAT (PC) ---
document.addEventListener('keydown', e => {
    if(!runner.active) return;
    switch(e.key) {
        case 'ArrowLeft': runner.moveLane('left'); break;
        case 'ArrowRight': runner.moveLane('right'); break;
        case 'ArrowUp': case ' ': runner.jump(); break;
        case 'ArrowDown': runner.slide(); break;
    }
});

</script>
</body>
