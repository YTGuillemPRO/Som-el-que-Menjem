<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Nutri-Dash App</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #121218;
            --primary: #00e676;
            --danger: #ff3d00;
            --gold: #ffd700;
            --text: #ffffff;
            --accent: #2979ff;
            --surface: #16161d;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh; height: 100dvh;
            overflow: hidden;
            position: fixed; inset: 0;
        }

        .app-view {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            background: var(--bg); z-index: 10;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
        }
        
        .view-hidden { transform: translateY(30px) scale(0.95); opacity: 0; pointer-events: none; z-index: 0; }
        .active-view { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; z-index: 10; }

        /* === MENÚ === */
        .menu-container { display: flex; flex-direction: column; height: 100%; position: relative; background: radial-gradient(ellipse at top, #1a1a2e 0%, #0a0a0f 50%, #000000 100%); }
        .menu-scroll-wrapper { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; position: relative; }
        .menu-scroll-wrapper::-webkit-scrollbar { width: 4px; }
        .menu-scroll-wrapper::-webkit-scrollbar-track { background: transparent; }
        .menu-scroll-wrapper::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        .menu-content-full { min-height: 100%; display: flex; flex-direction: column; padding-bottom: 60px; }
        .menu-header { padding: 80px 40px 50px; text-align: center; position: relative; }
        .brand-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(0, 230, 118, 0.1); border: 1px solid rgba(0, 230, 118, 0.2); padding: 8px 20px; border-radius: 30px; font-size: 12px; font-weight: 700; letter-spacing: 1px; }
        .brand-icon { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; animation: pulse-glow 2s ease-in-out infinite; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 5px var(--primary); opacity: 1; } 50% { box-shadow: 0 0 15px var(--primary); opacity: 0.7; } }
        .main-title { font-size: clamp(42px, 9vw, 58px); font-weight: 900; line-height: 1.05; margin-bottom: 20px; background: linear-gradient(135deg, #ffffff 0%, #b0b0b0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .subtitle { font-size: 17px; color: rgba(255, 255, 255, 0.5); font-weight: 400; max-width: 340px; margin: 0 auto; line-height: 1.7; }
        .menu-cards-section { padding: 20px 32px 60px; display: flex; flex-direction: column; gap: 24px; }
        .game-card { position: relative; background: linear-gradient(135deg, var(--surface) 0%, rgba(22, 22, 29, 0.8) 100%); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; padding: 32px; cursor: pointer; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .game-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.02) 100%); opacity: 0; transition: opacity 0.4s; border-radius: 28px; }
        .game-card:hover::before, .game-card:active::before { opacity: 1; }
        .game-card:hover, .game-card:active { transform: translateY(-4px) scale(1.01); border-color: rgba(255, 255, 255, 0.15); box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1); }
        .card-glow { position: absolute; width: 200px; height: 200px; border-radius: 50%; filter: blur(80px); opacity: 0.15; pointer-events: none; transition: all 0.4s; }
        .card-quiz .card-glow { background: var(--primary); top: -80px; right: -60px; }
        .card-runner .card-glow { background: var(--gold); bottom: -80px; left: -60px; }
        .game-card:hover .card-glow { opacity: 0.25; transform: scale(1.2); }
        .card-header { display: flex; align-items: center; gap: 20px; margin-bottom: 18px; position: relative; z-index: 2; }
        .card-icon { width: 64px; height: 64px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
        .icon-quiz { background: linear-gradient(135deg, rgba(0, 230, 118, 0.15) 0%, rgba(0, 230, 118, 0.05) 100%); color: var(--primary); box-shadow: 0 8px 24px rgba(0, 230, 118, 0.15); }
        .icon-runner { background: linear-gradient(135deg, rgba(255, 215, 0, 0.15) 0%, rgba(255, 215, 0, 0.05) 100%); color: var(--gold); box-shadow: 0 8px 24px rgba(255, 215, 0, 0.15); }
        .card-title-group { flex: 1; }
        .card-title { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 4px; letter-spacing: -0.5px; }
        .card-tag { display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; padding: 4px 12px; border-radius: 20px; background: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.7); }
        .card-description { font-size: 15px; color: rgba(255, 255, 255, 0.45); line-height: 1.6; position: relative; z-index: 2; }
        .card-arrow { position: absolute; right: 28px; top: 50%; transform: translateY(-50%); width: 44px; height: 44px; border-radius: 14px; background: rgba(255, 255, 255, 0.06); display: flex; align-items: center; justify-content: center; font-size: 18px; color: rgba(255, 255, 255, 0.5); transition: all 0.3s; }
        .game-card:hover .card-arrow { background: rgba(255, 255, 255, 0.12); transform: translateY(-50%) translateX(4px); color: rgba(255, 255, 255, 0.7); }

        /* === DIFFICULTY SELECTOR === */
        .difficulty-selector { display: flex; gap: 12px; justify-content: center; margin-bottom: 30px; }
        .diff-btn { padding: 10px 20px; border-radius: 20px; border: 2px solid rgba(255, 255, 255, 0.2); background: transparent; color: rgba(255, 255, 255, 0.6); cursor: pointer; font-weight: 700; transition: all 0.3s; }
        .diff-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }
        .diff-btn:hover { border-color: rgba(255, 255, 255, 0.5); }

        /* === QUIZ === */
        .quiz-header { padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .back-btn { width: 48px; height: 48px; border-radius: 14px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .back-btn:hover, .back-btn:active { background: rgba(255, 255, 255, 0.15); transform: scale(0.96); }
        .score-display { display: flex; align-items: center; gap: 10px; background: rgba(0, 230, 118, 0.1); border: 1px solid rgba(0, 230, 118, 0.2); padding: 10px 20px; border-radius: 30px; font-weight: 800; }
        .quiz-container { display: flex; flex-direction: column; justify-content: center; align-items: center; flex: 1; padding: 40px 24px; gap: 40px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .food-card { width: 100%; max-width: 360px; background: linear-gradient(180deg, var(--surface) 0%, rgba(22, 22, 29, 0.9) 100%); border-radius: 32px; padding: 56px 32px; border: 1px solid rgba(255, 255, 255, 0.1); position: relative; }
        .food-card::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 200px; height: 200px; background: radial-gradient(circle, rgba(0, 230, 118, 0.08) 0%, transparent 70%); filter: blur(40px); }
        .food-emoji { font-size: 120px; display: block; margin-bottom: 24px; animation: pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.3)); }
        @keyframes pop-in { 0% { transform: scale(0) rotate(-10deg); opacity: 0; } 70% { transform: scale(1.15) rotate(2deg); } 100% { transform: scale(1) rotate(0); opacity: 1; } }
        .food-name { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 8px; letter-spacing: -0.5px; }
        .food-question { font-size: 15px; color: rgba(255, 255, 255, 0.45); font-weight: 500; }
        .streak-display { font-size: 14px; color: var(--primary); font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .streak-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(0, 230, 118, 0.15); padding: 4px 10px; border-radius: 20px; }
        .quiz-controls { display: flex; gap: 20px; width: 100%; max-width: 380px; flex-shrink: 0; }
        .answer-btn { flex: 1; height: 120px; border-radius: 24px; border: none; font-family: inherit; font-size: 19px; font-weight: 800; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; transition: all 0.15s; }
        .answer-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255, 255, 255, 0.1) 0%, transparent 50%); opacity: 0; transition: opacity 0.2s; border-radius: 24px; }
        .answer-btn:hover::before, .answer-btn:active::before { opacity: 1; }
        .btn-yes { background: linear-gradient(135deg, var(--primary) 0%, #00c853 100%); box-shadow: 0 12px 0 #009624, 0 15px 30px rgba(0, 230, 118, 0.3); }
        .btn-no { background: linear-gradient(135deg, var(--danger) 0%, #dd2c00 100%); box-shadow: 0 12px 0 #bf360c, 0 15px 30px rgba(255, 61, 0, 0.3); }
        .answer-btn:hover { transform: translateY(-2px); }
        .answer-btn:active { transform: translateY(8px); box-shadow: 0 4px 0 currentColor, 0 8px 20px rgba(0, 0, 0, 0.2); }
        .btn-label { font-size: 11px; opacity: 0.75; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; }
        .btn-score { font-size: 16px; font-weight: 900; }

        /* === RUNNER - ESTILO MINION RUSH REAL === */
        .runner-game {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom,
                #1565C0 0%,
                #1976D2 15%,
                #42A5F5 35%,
                #64B5F6 55%,
                #90CAF9 80%,
                #BBDEFB 92%,
                #E3F2FD 100%
            );
            overflow: hidden; touch-action: none; z-index: 1;
            perspective: 1200px;
        }

        /* Paredes azules */
        .lab-walls {
            position: absolute; inset: 0;
            background:
                repeating-linear-gradient(90deg, transparent 0px, transparent 160px, rgba(33, 150, 243, 0.06) 160px, rgba(33, 150, 243, 0.02) 180px),
                repeating-linear-gradient(0deg, transparent 0px, transparent 280px, rgba(25, 118, 210, 0.04) 280px, rgba(25, 118, 210, 0.015) 300px);
            z-index: 1;
        }

        .pipe-left-main {
            position: absolute; left: 0; top: 8%;
            width: 18%; height: 42%;
            background: linear-gradient(to right, #0D47A1 0%, #1565C0 20%, #1976D2 45%, #42A5F5 70%, #64B5F6 90%, #90CAF9 100%);
            z-index: 3;
            clip-path: polygon(0 0, 100% 0, 92% 100%, 0 100%);
            box-shadow: 8px 0 25px rgba(13, 71, 161, 0.4);
        }

        .pipe-left-bottom {
            position: absolute; left: 2%; top: 56%;
            width: 12%; height: 28%;
            background: linear-gradient(to right, #0277BD, #039BE5, #29B6F6);
            border-radius: 8px;
            z-index: 3;
            box-shadow: 4px 0 15px rgba(21, 101, 192, 0.35);
        }

        .pipe-right-main {
            position: absolute; right: 0; top: 5%;
            width: 20%; height: 48%;
            background: linear-gradient(to left, #0D47A1 0%, #1565C0 20%, #1976D2 45%, #42A5F5 70%, #64B5F6 90%, #90CAF9 100%);
            z-index: 3;
            clip-path: polygon(8% 0, 100% 0, 100% 100%, 0 100%);
            box-shadow: -8px 0 25px rgba(13, 71, 161, 0.4);
        }

        .pipe-right-bottom {
            position: absolute; right: 3%; top: 60%;
            width: 14%; height: 26%;
            background: linear-gradient(to left, #0277BD, #039BE5, #29B6F6);
            border-radius: 8px;
            z-index: 3;
            box-shadow: -4px 0 15px rgba(21, 101, 192, 0.35);
        }

        .pipe-top-ceiling {
            position: absolute; top: 0; left: 0; right: 0; height: 12%;
            background: linear-gradient(to bottom, #0D47A1 0%, #1565C0 30%, #1976D2 60%, #42A5F5 85%, #64B5F6 100%);
            z-index: 3;
            box-shadow: 0 8px 20px rgba(13, 71, 161, 0.3);
        }

        /* Suelo negro con líneas naranjas */
        .corridor-floor {
            position: absolute; bottom: 0; left: 0; right: 0; height: 58%;
            background: linear-gradient(to bottom,
                #212121 0%,
                #303030 20%,
                #383838 40%,
                #424242 60%,
                #505050 80%,
                #5a5a5a 95%,
                #616161 100%
            );
            z-index: 2;
            transform-origin: top center;
            transform: perspective(900px) rotateX(22deg);
            transform-style: preserve-3d;
        }

        .floor-lines-orange {
            position: absolute; bottom: 0; left: 0; right: 0; height: 58%;
            background-image:
                repeating-linear-gradient(90deg, 
                    transparent 0px, 
                    transparent calc(33.33% - 6px), 
                    #FF9800 calc(33.33% - 6px), 
                    #FF9800 calc(33.33% + 6px), 
                    transparent calc(33.33% + 6px), 
                    transparent 66.66%
                ),
                repeating-linear-gradient(0deg,
                    transparent 0px,
                    transparent 55px,
                    #FF9800 55px,
                    #FF9800 62px,
                    transparent 62px
                );
            z-index: 3;
            mask-image: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
            animation: floor-scroll 0.2s linear infinite;
        }

        @keyframes floor-scroll {
            from { background-position: 0 0, 0 0; }
            to { background-position: 0 62px, 0 62px; }
        }

        .border-left-orange {
            position: absolute; bottom: 0; left: 22%;
            width: 6%; height: 58%;
            background: linear-gradient(to bottom, #FFC107, #FF9800, #F57C00);
            z-index: 4;
            transform-origin: top center;
            transform: perspective(900px) rotateY(12deg) skewX(-3deg);
            clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%);
            box-shadow: 0 0 25px rgba(255, 152, 0, 0.6);
        }

        .border-right-orange {
            position: absolute; bottom: 0; right: 22%;
            width: 6%; height: 58%;
            background: linear-gradient(to bottom, #FFC107, #FF9800, #F57C00);
            z-index: 4;
            transform-origin: top center;
            transform: perspective(900px) rotateY(-12deg) skewX(3deg);
            clip-path: polygon(10% 0, 100% 0, 100% 100%, 0 100%);
            box-shadow: 0 0 25px rgba(255, 152, 0, 0.6);
        }

        /* === MINION IMPROVED === */
        .player-container {
            position: absolute; bottom: 18%; left: 50%; transform: translateX(-50%);
            width: 140px; height: 170px;
            z-index: 50;
            transition: left 0.09s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex; justify-content: center; align-items: flex-end;
            perspective: 800px;
        }

        /* MINION CHARACTER */
        .minion-character {
            position: relative;
            width: 130px;
            height: 170px;
            animation: runReal 0.2s ease-in-out infinite;
            transform-origin: bottom center;
            transform-style: preserve-3d;
            filter: drop-shadow(0 25px 50px rgba(0, 0, 0, 0.7));
        }

        @keyframes runReal {
            0%, 100% { transform: translateY(0) scaleY(1) scaleX(1) rotateY(0deg) rotateZ(0deg); }
            50% { transform: translateY(-25px) scaleY(1.1) scaleX(0.94) rotateY(6deg) rotateZ(3deg); }
        }

        /* BODY - Enhanced proportions */
        .minion-body {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 120px;
            background: 
                radial-gradient(ellipse 40% 30% at 20% 20%, rgba(255,255,255,0.6) 0%, transparent 50%),
                radial-gradient(ellipse 35% 45% at 80% 75%, rgba(139,69,19,0.25) 0%, transparent 60%),
                linear-gradient(135deg, 
                    #FFE93A 0%, 
                    #FFDF35 18%,
                    #F4D03F 40%,
                    #E8BF2D 65%,
                    #DDAA1C 88%,
                    #CC9918 100%
                );
            border-radius: 55px 55px 50px 50px;
            box-shadow: 
                inset 0 -22px 45px rgba(101, 67, 33, 0.35),
                inset 0 22px 40px rgba(255, 255, 255, 0.52),
                inset -8px 0 18px rgba(0,0,0,0.18),
                inset 8px 0 18px rgba(255,255,255,0.2),
                0 18px 40px rgba(0, 0, 0, 0.45),
                0 8px 15px rgba(0, 0, 0, 0.3);
            overflow: visible;
            transform-style: preserve-3d;
        }

        /* Body texture */
        .minion-body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                repeating-linear-gradient(90deg, 
                    transparent 0px, 
                    transparent 13px, 
                    rgba(255,255,255,0.05) 13px, 
                    rgba(255,255,255,0.05) 14px
                ),
                repeating-linear-gradient(0deg, 
                    transparent 0px, 
                    transparent 24px, 
                    rgba(0,0,0,0.025) 24px, 
                    rgba(0,0,0,0.025) 25px
                );
            border-radius: inherit;
        }

        /* GOGGLE FRAME - Larger */
        .minion-goggle-frame {
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%) translateZ(15px);
            width: 85px;
            height: 78px;
            background: linear-gradient(150deg, 
                #AAAAAA 0%, 
                #888888 20%,
                #666666 40%,
                #444444 65%,
                #252525 88%,
                #0D0D0D 100%
            );
            border-radius: 42px 42px 38px 38px;
            border: 5px solid #000;
            box-shadow: 
                0 12px 32px rgba(0,0,0,0.7),
                inset 0 6px 14px rgba(255,255,255,0.3),
                inset 0 -6px 14px rgba(0,0,0,0.55),
                0 4px 8px rgba(0,0,0, 0.4);
            z-index: 12;
            transform-style: preserve-3d;
        }

        /* LEFT EYE */
        .minion-eye-left {
            position: absolute;
            top: 50%;
            left: 28%;
            transform: translate(-50%, -50%) translateZ(10px);
            width: 32px;
            height: 32px;
            background: radial-gradient(circle at 35% 35%, #FFFFFF 0%, #F0F0F0 20%, #E0E0E0 50%, #C0C0C0 80%, #A0A0A0 100%);
            border-radius: 50%;
            border: 2px solid #666;
            box-shadow: 
                inset 0 5px 12px rgba(0,0,0,0.12),
                0 3px 8px rgba(0,0,0,0.25),
                inset 0 -2px 6px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        /* RIGHT EYE */
        .minion-eye-right {
            position: absolute;
            top: 50%;
            right: 28%;
            transform: translate(50%, -50%) translateZ(10px);
            width: 32px;
            height: 32px;
            background: radial-gradient(circle at 35% 35%, #FFFFFF 0%, #F0F0F0 20%, #E0E0E0 50%, #C0C0C0 80%, #A0A0A0 100%);
            border-radius: 50%;
            border: 2px solid #666;
            box-shadow: 
                inset 0 5px 12px rgba(0,0,0,0.12),
                0 3px 8px rgba(0,0,0,0.25),
                inset 0 -2px 6px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        /* IRIS */
        .minion-iris {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            background: radial-gradient(circle at 35% 35%,
                #8B7D52 0%,
                #6D5E43 30%,
                #494129 60%,
                #2C1D10 85%,
                #0A0602 100%
            );
            border-radius: 50%;
            animation: lookReal 4.5s ease-in-out infinite;
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.6);
        }

        @keyframes lookReal {
            0%, 100% { transform: translate(-50%, -50%); }
            20% { transform: translate(-35%, -50%); }
            40% { transform: translate(-50%, -35%); }
            60% { transform: translate(-65%, -50%); }
            80% { transform: translate(-50%, -65%); }
        }

        /* PUPIL */
        .minion-pupil {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 9px;
            height: 9px;
            background: radial-gradient(circle at 38% 38%, #111 0%, #000 100%);
            border-radius: 50%;
            box-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }

        .minion-pupil::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 1px;
            width: 5px;
            height: 5px;
            background: radial-gradient(circle, #FFF 0%, #DDD 100%);
            border-radius: 50%;
        }

        /* ARMS - Improved */
        .minion-arm-left {
            position: absolute;
            top: 55px;
            left: -18px;
            width: 26px;
            height: 60px;
            background: linear-gradient(98deg,
                #CC9918 0%,
                #FFE93A 24%,
                #F4D03F 50%,
                #E8BF2D 76%,
                #DDAA1C 100%
            );
            border-radius: 15px;
            transform-origin: top center;
            animation: armLeftReal 0.2s ease-in-out infinite;
            box-shadow: 
                inset 6px 0 10px rgba(255,255,255,0.35),
                8px 6px 16px rgba(0,0,0,0.35),
                inset -5px 0 8px rgba(0,0,0,0.18);
            transform-style: preserve-3d;
        }

        .minion-arm-left::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 28px;
            height: 28px;
            background: linear-gradient(180deg, #555 0%, #333 45%, #1a1a1a 80%, #0a0a0a 100%);
            border-radius: 50%;
            border: 4px solid #000;
            box-shadow: 0 8px 18px rgba(0,0,0,0.6), inset 0 3px 8px rgba(255,255,255,0.15);
        }

        .minion-arm-right {
            position: absolute;
            top: 55px;
            right: -18px;
            width: 26px;
            height: 60px;
            background: linear-gradient(262deg,
                #CC9918 0%,
                #FFE93A 24%,
                #F4D03F 50%,
                #E8BF2D 76%,
                #DDAA1C 100%
            );
            border-radius: 15px;
            transform-origin: top center;
            animation: armRightReal 0.2s ease-in-out infinite;
            box-shadow: 
                inset -6px 0 10px rgba(255,255,255,0.35),
                -8px 6px 16px rgba(0,0,0,0.35),
                inset 5px 0 8px rgba(255,255,255,0.2);
            transform-style: preserve-3d;
        }

        .minion-arm-right::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 28px;
            height: 28px;
            background: linear-gradient(180deg, #555 0%, #333 45%, #1a1a1a 80%, #0a0a0a 100%);
            border-radius: 50%;
            border: 4px solid #000;
            box-shadow: 0 8px 18px rgba(0,0,0,0.6), inset 0 3px 8px rgba(255,255,255,0.15);
        }

        @keyframes armLeftReal {
            0%, 100% { transform: rotateZ(28deg) rotateY(-10deg) rotateX(5deg); }
            50% { transform: rotateZ(-32deg) rotateY(10deg) rotateX(-5deg); }
        }

        @keyframes armRightReal {
            0%, 100% { transform: rotateZ(-28deg) rotateY(10deg) rotateX(5deg); }
            50% { transform: rotateZ(32deg) rotateY(-10deg) rotateX(-5deg); }
        }

        /* MOUTH - Improved */
        .minion-mouth-container {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 28px;
            z-index: 8;
        }

        .minion-mouth {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg,
                #4D2E1A 0%,
                #361D0E 45%,
                #1F1209 75%,
                #0F0704 100%
            );
            border-radius: 0 0 25px 25px;
            border: 4px solid #070503;
            box-shadow: 
                inset 0 -10px 18px rgba(0,0,0,0.7),
                0 6px 12px rgba(0,0,0,0.32),
                inset 0 7px 10px rgba(255,255,255,0.08);
            overflow: hidden;
        }

        .minion-teeth {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 14px;
            background: linear-gradient(180deg, #FAFAFA 0%, #E8E8E8 100%);
            clip-path: polygon(
                0 0, 8% 100%, 16% 0, 24% 100%, 32% 0, 40% 100%, 48% 0, 56% 100%, 64% 0, 72% 100%, 80% 0, 88% 100%, 100% 100%
            );
            box-shadow: 0 1px 5px rgba(0,0,0,0.18);
        }

        .minion-tongue {
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 11px;
            background: linear-gradient(180deg, #F44336 0%, #D32F2F 65%, #B71C1C 100%);
            border-radius: 0 0 12px 12px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.4);
        }

        /* PANTS - Blue overalls */
        .minion-legs-container {
            position: absolute;
            bottom: -32px;
            left: 50%;
            transform: translateX(-50%);
            width: 85px;
            height: 42px;
            display: flex;
            justify-content: space-between;
            transform-style: preserve-3d;
        }

        .minion-leg {
            width: 30px;
            height: 42px;
            background: linear-gradient(180deg,
                #5C6BC0 0%,
                #3F51B5 25%,
                #303F9F 50%,
                #283593 75%,
                #1A237E 100%
            );
            border-radius: 15px 15px 18px 18px;
            box-shadow: 
                inset 5px 0 8px rgba(255,255,255,0.24),
                inset -5px 0 8px rgba(0,0,0,0.22),
                0 6px 14px rgba(0,0,0,0.4),
                0 2px 6px rgba(0,0,0,0.22);
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
        }

        .minion-leg.left { animation: legLeftReal 0.2s ease-in-out infinite; }
        .minion-leg.right { animation: legRightReal 0.2s ease-in-out infinite; animation-delay: 0.1s; }

        @keyframes legLeftReal {
            0%, 100% { transform: translateY(0) rotateX(0deg) rotateZ(0deg); }
            50% { transform: translateY(-18px) rotateX(20deg) rotateZ(14deg); }
        }

        @keyframes legRightReal {
            0%, 100% { transform: translateY(0) rotateX(0deg) rotateZ(0deg); }
            50% { transform: translateY(-18px) rotateX(-20deg) rotateZ(-14deg); }
        }

        /* SHOES */
        .minion-shoe {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 20px;
            background: linear-gradient(180deg,
                #4A4A4A 0%,
                #323232 30%,
                #1F1F1F 65%,
                #0D0D0D 100%
            );
            border-radius: 12px 12px 14px 14px;
            border: 4px solid #000;
            box-shadow: 
                0 8px 20px rgba(0,0,0,0.6),
                0 4px 8px rgba(0,0,0,0.35),
                inset 0 4px 6px rgba(255,255,255,0.18),
                inset 0 -2px 5px rgba(0,0,0,0.4);
        }

        /* JUMP & SLIDE */
        .player-jump .minion-character {
            animation: jumpReal 0.62s cubic-bezier(0.25, 0.46, 0.45, 0.94) !important;
        }

        @keyframes jumpReal {
            0% { transform: translateY(0) scaleY(1) scaleX(1); }
            15% { transform: translateY(-100px) scaleY(1.18) scaleX(0.88); }
            35% { transform: translateY(-220px) scaleY(1.25) scaleX(0.85); }
            52% { transform: translateY(-230px) scaleY(1.28) scaleX(0.82); }
            70% { transform: translateY(-210px) scaleY(1.22) scaleX(0.86); }
            85% { transform: translateY(-90px) scaleY(1.13) scaleX(0.90); }
            100% { transform: translateY(0) scaleY(1) scaleX(1); }
        }

        .player-slide .minion-character {
            animation: slideReal 0.72s cubic-bezier(0.25, 0.46, 0.45, 0.94) !important;
        }

        @keyframes slideReal {
            0% { transform: translateY(0) scaleY(1) scaleX(1); }
            18% { transform: translateY(45px) scaleY(0.28) scaleX(1.6); }
            50% { transform: translateY(48px) scaleY(0.25) scaleX(1.65); }
            82% { transform: translateY(45px) scaleY(0.27) scaleX(1.62); }
            100% { transform: translateY(0) scaleY(1) scaleX(1); }
        }

        /* OBSTACLES - With 3D perspective */
        .obstacle-3d {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            will-change: transform, opacity, font-size;
            z-index: 40;
            font-size: 24px;
        }

        .obs-far { font-size: 16px; opacity: 0.4; filter: brightness(0.7); }
        .obs-mid { font-size: 32px; opacity: 0.7; filter: brightness(0.9); }
        .obs-near { font-size: 56px; opacity: 1; filter: brightness(1.2) saturate(1.2) drop-shadow(0 15px 35px rgba(0,0,0,0.5)); }
        
        .obs-hit {
            opacity: 0 !important;
            transform: translate(-50%, -50%) scale(4) !important;
            transition: opacity 0.2s, transform 0.2s !important;
        }

        .obstacle-coin {
            animation: spinCoin 0.3s linear infinite, bounceCoin 1s ease-in-out infinite;
        }

        @keyframes spinCoin {
            from { transform: translate(-50%, -50%) rotateY(0deg); }
            to { transform: translate(-50%, -50%) rotateY(360deg); }
        }

        @keyframes bounceCoin {
            0%, 100% { margin-top: 0; }
            50% { margin-top: -14px; }
        }

        /* HUD */
        .runner-hud {
            position: absolute;
            top: 12px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
            pointer-events: none;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .hud-stat {
            background: rgba(0, 0, 0, 0.72);
            backdrop-filter: blur(22px);
            padding: 12px 23px;
            border-radius: 25px;
            border: 2.5px solid rgba(255, 255, 255, 0.22);
            font-weight: 900;
            font-size: 17px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4), inset 0 2px 0 rgba(255, 255, 255, 0.16);
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.55);
        }

        /* Overlays */
        .game-overlay {
            position: absolute;
            inset: 0;
            z-index: 300;
            background: linear-gradient(135deg, rgba(79, 195, 247, 0.97) 0%, rgba(129, 212, 250, 0.97) 50%, rgba(139, 195, 74, 0.97) 100%);
            backdrop-filter: blur(30px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }
        
        .overlay-icon-large {
            font-size: 115px;
            margin-bottom: 28px;
            filter: drop-shadow(0 22px 45px rgba(0, 0, 0, 0.38));
            animation: bounceIcon 1.2s ease-in-out infinite;
        }

        @keyframes bounceIcon {
            0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
            22% { transform: translateY(-22px) scale(1.09) rotate(-5deg); }
            44% { transform: translateY(0) scale(1) rotate(0deg); }
            66% { transform: translateY(-14px) scale(1.05) rotate(4deg); }
            88% { transform: translateY(0) scale(1) rotate(0deg); }
        }

        .overlay-title {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 14px;
            letter-spacing: -2px;
            color: #1B5E20;
            text-shadow: 0 6px 12px rgba(0, 0, 0, 0.24), 0 0 45px rgba(255, 255, 255, 0.68);
        }

        .overlay-subtitle {
            font-size: 16px;
            color: rgba(0, 0, 0, 0.64);
            margin-bottom: 42px;
            line-height: 1.8;
            max-width: 350px;
            font-weight: 500;
        }

        .primary-btn {
            background: linear-gradient(135deg, #FFD700 0%, #FFA000 100%);
            color: #1B5E20;
            border: none;
            padding: 23px 55px;
            border-radius: 56px;
            font-size: 21px;
            font-weight: 900;
            font-family: inherit;
            cursor: pointer;
            width: 100%;
            max-width: 310px;
            box-shadow: 0 11px 0 #F57C00, 0 18px 45px rgba(255, 152, 0, 0.5);
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        .primary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 0 #F57C00, 0 24px 55px rgba(255, 152, 0, 0.6);
        }

        .primary-btn:active {
            transform: translateY(6px);
            box-shadow: 0 5px 0 #F57C00, 0 8px 26px rgba(255, 152, 0, 0.34);
        }

        .secondary-btn {
            background: rgba(255, 255, 255, 0.37);
            border: 2.5px solid rgba(255, 255, 255, 0.6);
            color: #1B5E20;
            font-size: 34px;
            margin-top: 30px;
            cursor: pointer;
            padding: 17px 30px;
            border-radius: 50%;
            transition: all 0.2s;
            font-weight: 700;
        }

        .secondary-btn:hover {
            background: rgba(255, 255, 255, 0.58);
            transform: scale(1.15);
        }

        .final-score-label {
            font-size: 15px;
            color: rgba(0, 0, 0, 0.54);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .final-score-value {
            font-size: 84px;
            font-weight: 900;
            color: #FFD700;
            margin-bottom: 42px;
            text-shadow: 0 8px 22px rgba(255, 152, 0, 0.6), 0 0 55px rgba(255, 215, 0, 0.75);
        }

        .game-over-overlay {
            background: linear-gradient(135deg, rgba(244, 67, 54, 0.97) 0%, rgba(211, 47, 47, 0.97) 100%) !important;
        }

        @media (max-width: 480px) {
            .menu-header { padding: 64px 24px 40px; }
            .main-title { font-size: clamp(38px, 10vw, 52px); }
            .menu-cards-section { padding: 16px 20px 48px; gap: 20px; }
            .game-card { padding: 28px 24px; }
            .card-icon { width: 56px; height: 56px; font-size: 24px; }
            .card-title { font-size: 21px; }
            .card-description { font-size: 14px; }
            .card-arrow { width: 40px; height: 40px; right: 20px; }
            .quiz-controls { gap: 16px; }
            .answer-btn { height: 110px; font-size: 17px; }
            .minion-character { transform: scale(0.8); }
            .overlay-title { font-size: 37px; }
            .final-score-value { font-size: 66px; }
        }
    </style>
</head>
<body>

<!-- MENÚ -->
<div id="viewMenu" class="app-view active-view">
    <div class="menu-container">
        <div class="menu-scroll-wrapper">
            <div class="menu-content-full">
                <div class="menu-header">
                    <div class="brand-badge"><span class="brand-icon"></span>Nutri • Dash</div>
                    <h1 class="main-title">Benvingut</h1>
                    <p class="subtitle">Desafia la teva ment i les teves reflexes en dues experiències úniques i emocionants</p>
                </div>
                <div class="menu-cards-section">
                    <button class="game-card card-quiz" onclick="nav.to('quiz')">
                        <div class="card-glow"></div>
                        <div class="card-header">
                            <div class="card-icon icon-quiz"><i class="fa-solid fa-brain"></i></div>
                            <div class="card-title-group"><h3 class="card-title">Mode Preguntes</h3><span class="card-tag">Mental</span></div>
                            <div class="card-arrow"><i class="fa-solid fa-arrow-right"></i></div>
                        </div>
                        <p class="card-description">Ràpid, mental i adictiu. Identifica aliments saludables en un rellotge contrarellotge.</p>
                    </button>

                    <button class="game-card card-runner" onclick="nav.to('runner')">
                        <div class="card-glow"></div>
                        <div class="card-header">
                            <div class="card-icon icon-runner"><i class="fa-solid fa-bolt"></i></div>
                            <div class="card-title-group"><h3 class="card-title">Mode Carrera</h3><span class="card-tag">Acció</span></div>
                            <div class="card-arrow"><i class="fa-solid fa-arrow-right"></i></div>
                        </div>
                        <p class="card-description">Minion Run Laboratori: Córrer pel corredor secret!</p>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- QUIZ -->
<div id="viewQuiz" class="app-view view-hidden">
    <div class="quiz-header">
        <button class="back-btn" onclick="nav.to('menu')"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="score-display"><span>🎯</span><span id="scoreQuiz">0</span></div>
    </div>
    <div class="quiz-container">
        <div class="difficulty-selector">
            <button class="diff-btn active" data-diff="easy" onclick="setQuizDifficulty('easy')">Fàcil</button>
            <button class="diff-btn" data-diff="medium" onclick="setQuizDifficulty('medium')">Mitjà</button>
            <button class="diff-btn" data-diff="hard" onclick="setQuizDifficulty('hard')">Difícil</button>
        </div>
        <div class="food-card">
            <span class="food-emoji" id="foodEmoji">🍎</span>
            <h2 class="food-name" id="foodName">Poma</h2>
            <p class="food-question">És una opció saludable?</p>
            <div class="streak-display" id="streakDisplay" style="display:none;">
                <span>🔥</span>
                <span id="streakCount">0</span>
                <span>streak</span>
                <span id="multiplier" class="streak-badge">x1</span>
            </div>
        </div>
        <div class="quiz-controls">
            <button class="answer-btn btn-yes" onclick="answerQuiz(true)">
                <span class="btn-label">Sí</span>
                <span class="btn-score" id="scoreYes">+10</span>
            </button>
            <button class="answer-btn btn-no" onclick="answerQuiz(false)">
                <span class="btn-label">No</span>
                <span class="btn-score" id="scoreNo">+10</span>
            </button>
        </div>
    </div>
</div>

<!-- RUNNER -->
<div id="viewRunner" class="app-view view-hidden">
    <div class="runner-game">
        <div class="lab-walls"></div>
        <div class="pipe-left-main"></div>
        <div class="pipe-left-bottom"></div>
        <div class="pipe-right-main"></div>
        <div class="pipe-right-bottom"></div>
        <div class="pipe-top-ceiling"></div>
        <div class="corridor-floor"></div>
        <div class="floor-lines-orange"></div>
        <div class="border-left-orange"></div>
        <div class="border-right-orange"></div>

        <div class="runner-hud">
            <div class="hud-stat"><span>📏</span><span id="distance">0</span>m</div>
            <div class="hud-stat"><span>💰</span><span id="coins">0</span></div>
            <div class="hud-stat"><span>❤️</span><span id="health">3</span></div>
        </div>

        <div class="player-container">
            <div class="minion-character">
                <div class="minion-body">
                    <div class="minion-goggle-frame">
                        <div class="minion-eye-left">
                            <div class="minion-iris">
                                <div class="minion-pupil"></div>
                            </div>
                        </div>
                        <div class="minion-eye-right">
                            <div class="minion-iris">
                                <div class="minion-pupil"></div>
                            </div>
                        </div>
                    </div>
                    <div class="minion-mouth-container">
                        <div class="minion-mouth">
                            <div class="minion-teeth"></div>
                            <div class="minion-tongue"></div>
                        </div>
                    </div>
                </div>
                <div class="minion-arm-left"></div>
                <div class="minion-arm-right"></div>
                <div class="minion-legs-container">
                    <div class="minion-leg left">
                        <div class="minion-shoe"></div>
                    </div>
                    <div class="minion-leg right">
                        <div class="minion-shoe"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="gameOverlay" class="game-overlay" style="display:none;">
            <div class="overlay-icon-large">🎉</div>
            <div class="final-score-label">Final Score</div>
            <div class="final-score-value" id="finalScore">0</div>
            <button class="primary-btn" onclick="nav.to('menu')">Tornar al Menú</button>
            <button class="secondary-btn" onclick="restartRunner()">🔄</button>
        </div>
    </div>
</div>

<script>
    // Enhanced Food Database
    const foodDatabase = {
        easy: [
            { name: 'Poma', emoji: '🍎', healthy: true },
            { name: 'Plàtan', emoji: '🍌', healthy: true },
            { name: 'Zanahòria', emoji: '🥕', healthy: true },
            { name: 'Bròquil', emoji: '🥦', healthy: true },
            { name: 'Galeta', emoji: '🍪', healthy: false },
            { name: 'Xocolata', emoji: '🍫', healthy: false },
            { name: 'Beguda gaseosa', emoji: '🥤', healthy: false },
            { name: 'Llimona', emoji: '🍋', healthy: true },
        ],
        medium: [
            { name: 'Bròquil', emoji: '🥦', healthy: true },
            { name: 'Peix', emoji: '🐟', healthy: true },
            { name: 'Ou', emoji: '🥚', healthy: true },
            { name: 'Fruites seces', emoji: '🥜', healthy: true },
            { name: 'Formatge', emoji: '🧀', healthy: true },
            { name: 'Pizza', emoji: '🍕', healthy: false },
            { name: 'Burgesa', emoji: '🍔', healthy: false },
            { name: 'Patates fregides', emoji: '🍟', healthy: false },
        ],
        hard: [
            { name: 'Kiwi', emoji: '🥝', healthy: true },
            { name: 'Mango', emoji: '🥭', healthy: true },
            { name: 'Meló', emoji: '🍈', healthy: true },
            { name: 'Síndria', emoji: '🍉', healthy: true },
            { name: 'Iogurt natural', emoji: '🍶', healthy: true },
            { name: 'Oli d\'oliva', emoji: '🫒', healthy: true },
            { name: 'Pastís', emoji: '🎂', healthy: false },
            { name: 'Gelat', emoji: '🍦', healthy: false },
        ]
    };

    // Navigation
    const nav = {
        to: function(view) {
            document.querySelectorAll('.app-view').forEach(v => {
                v.classList.remove('active-view');
                v.classList.add('view-hidden');
            });
            document.getElementById('view' + view.charAt(0).toUpperCase() + view.slice(1)).classList.add('active-view');
            document.getElementById('view' + view.charAt(0).toUpperCase() + view.slice(1)).classList.remove('view-hidden');
            
            if (view === 'quiz') initQuiz();
            if (view === 'runner') initRunner();
        }
    };

    // ===== QUIZ GAME =====
    let quizState = {
        score: 0,
        streak: 0,
        multiplier: 1,
        difficulty: 'easy',
        currentFood: null,
        questionsAnswered: 0
    };

    function setQuizDifficulty(difficulty) {
        quizState.difficulty = difficulty;
        document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`[data-diff="${difficulty}"]`).classList.add('active');
        loadNextFood();
    }

    function initQuiz() {
        quizState = { score: 0, streak: 0, multiplier: 1, difficulty: 'easy', currentFood: null, questionsAnswered: 0 };
        document.getElementById('scoreQuiz').textContent = '0';
        setQuizDifficulty('easy');
    }

    function loadNextFood() {
        const foods = foodDatabase[quizState.difficulty];
        quizState.currentFood = foods[Math.floor(Math.random() * foods.length)];
        document.getElementById('foodEmoji').textContent = quizState.currentFood.emoji;
        document.getElementById('foodName').textContent = quizState.currentFood.name;
        
        const baseScore = quizState.difficulty === 'easy' ? 10 : quizState.difficulty === 'medium' ? 15 : 20;
        const scoreWithMultiplier = Math.floor(baseScore * quizState.multiplier);
        document.getElementById('scoreYes').textContent = '+' + scoreWithMultiplier;
        document.getElementById('scoreNo').textContent = '+' + scoreWithMultiplier;
    }

    function answerQuiz(answer) {
        const isCorrect = answer === quizState.currentFood.healthy;
        const baseScore = quizState.difficulty === 'easy' ? 10 : quizState.difficulty === 'medium' ? 15 : 20;
        const earnedPoints = Math.floor(baseScore * quizState.multiplier);
        
        if (isCorrect) {
            quizState.score += earnedPoints;
            quizState.streak++;
            quizState.multiplier = Math.min(1 + (quizState.streak * 0.1), 3);
            
            if (quizState.streak >= 3) {
                document.getElementById('streakDisplay').style.display = 'flex';
                document.getElementById('streakCount').textContent = quizState.streak;
                document.getElementById('multiplier').textContent = 'x' + quizState.multiplier.toFixed(1);
                
                if (quizState.streak % 5 === 0) {
                    confetti({ particleCount: 50, spread: 70, origin: { y: 0.6 } });
                }
            }
        } else {
            quizState.streak = 0;
            quizState.multiplier = 1;
            document.getElementById('streakDisplay').style.display = 'none';
        }
        
        quizState.questionsAnswered++;
        document.getElementById('scoreQuiz').textContent = quizState.score;
        loadNextFood();
    }

    // ===== RUNNER GAME WITH 3D PERSPECTIVE =====
    let runnerState = {
        isRunning: false,
        playerPos: 50,
        distance: 0,
        coins: 0,
        health: 3,
        speed: 1,
        score: 0,
        obstacles: [],
        gameTime: 0
    };

    const gameConfig = {
        playerWidth: 140,
        playerHeight: 170,
        gameWidth: window.innerWidth,
        gameHeight: window.innerHeight,
        minObstacleInterval: 80,
        maxObstacleInterval: 150,
        perspectiveStart: -500  // Far away distance
    };

    function initRunner() {
        runnerState = {
            isRunning: true,
            playerPos: 50,
            distance: 0,
            coins: 0,
            health: 3,
            speed: 1,
            score: 0,
            obstacles: [],
            gameTime: 0
        };

        document.getElementById('gameOverlay').style.display = 'none';
        document.getElementById('distance').textContent = '0';
        document.getElementById('coins').textContent = '0';
        document.getElementById('health').textContent = '3';

        document.addEventListener('keydown', handleRunnerInput);
        document.addEventListener('touchstart', handleRunnerInput);
        
        gameLoop();
    }

    function handleRunnerInput(e) {
        const playerContainer = document.querySelector('.player-container');
        const currentLeft = parseInt(window.getComputedStyle(playerContainer).left);
        
        if (e.key === 'ArrowLeft' || e.key === 'a') {
            const newPos = Math.max(0, currentLeft - 60);
            playerContainer.style.left = newPos + 'px';
            runnerState.playerPos = (newPos / gameConfig.gameWidth) * 100;
        } else if (e.key === 'ArrowRight' || e.key === 'd') {
            const newPos = Math.min(gameConfig.gameWidth - gameConfig.playerWidth, currentLeft + 60);
            playerContainer.style.left = newPos + 'px';
            runnerState.playerPos = (newPos / gameConfig.gameWidth) * 100;
        } else if (e.key === ' ' || e.key === 'ArrowUp') {
            e.preventDefault();
            jump();
        }

        if (e.touches) {
            const touchX = e.touches[0].clientX;
            if (touchX < gameConfig.gameWidth / 3) handleRunnerInput({ key: 'ArrowLeft' });
            else if (touchX > (gameConfig.gameWidth * 2) / 3) handleRunnerInput({ key: 'ArrowRight' });
            else jump();
        }
    }

    function jump() {
        const playerContainer = document.querySelector('.player-container');
        if (!playerContainer.classList.contains('player-jump')) {
            playerContainer.classList.add('player-jump');
            setTimeout(() => playerContainer.classList.remove('player-jump'), 620);
        }
    }

    function gameLoop() {
        if (!runnerState.isRunning) return;

        runnerState.gameTime++;
        runnerState.distance = Math.floor(runnerState.gameTime / 10);
        runnerState.speed = 1 + (runnerState.distance / 1000) * 0.5;

        if (Math.random() < 0.02 * runnerState.speed) {
            createObstacle();
        }

        // Update obstacles with 3D perspective
        document.querySelectorAll('.obstacle-3d').forEach(obstacle => {
            const top = parseFloat(obstacle.dataset.startTop || -50) + runnerState.speed * 8;
            obstacle.dataset.startTop = top;
            obstacle.style.top = top + 'px';

            // Apply 3D perspective: size and speed based on distance
            const distanceToPlayer = gameConfig.gameHeight - top;
            const scale = Math.max(0.3, Math.min(1, distanceToPlayer / gameConfig.gameHeight));
            
            // Update size dynamically
            if (scale < 0.5) {
                obstacle.classList.add('obs-far');
                obstacle.classList.remove('obs-mid', 'obs-near');
            } else if (scale < 0.85) {
                obstacle.classList.add('obs-mid');
                obstacle.classList.remove('obs-far', 'obs-near');
            } else {
                obstacle.classList.add('obs-near');
                obstacle.classList.remove('obs-far', 'obs-mid');
            }

            if (top > gameConfig.gameHeight) {
                obstacle.remove();
            } else {
                checkCollision(obstacle);
            }
        });

        document.getElementById('distance').textContent = runnerState.distance;
        document.getElementById('coins').textContent = runnerState.coins;
        document.getElementById('health').textContent = runnerState.health;

        if (runnerState.health <= 0) {
            endRunner();
            return;
        }

        requestAnimationFrame(gameLoop);
    }

    function createObstacle() {
        const types = ['wall', 'coin', 'wall'];
        const type = types[Math.floor(Math.random() * types.length)];
        const left = Math.random() * (gameConfig.gameWidth - 50);
        
        const obstacle = document.createElement('div');
        obstacle.className = 'obstacle-3d obs-far';
        obstacle.style.left = left + 'px';
        obstacle.style.top = '-50px';
        obstacle.dataset.startTop = -50;
        
        if (type === 'wall') {
            obstacle.textContent = '🧱';
            obstacle.dataset.type = 'wall';
        } else {
            obstacle.textContent = '💰';
            obstacle.dataset.type = 'coin';
            obstacle.classList.add('obstacle-coin');
        }

        document.querySelector('.runner-game').appendChild(obstacle);
    }

    function checkCollision(obstacle) {
        const playerContainer = document.querySelector('.player-container');
        const playerRect = playerContainer.getBoundingClientRect();
        const obstacleRect = obstacle.getBoundingClientRect();

        if (!(playerRect.right < obstacleRect.left || 
              playerRect.left > obstacleRect.right || 
              playerRect.bottom < obstacleRect.top || 
              playerRect.top > obstacleRect.bottom)) {
            
            if (obstacle.dataset.type === 'coin') {
                runnerState.coins += 5;
                runnerState.score += 5;
                obstacle.classList.add('obs-hit');
                setTimeout(() => obstacle.remove(), 200);
            } else {
                runnerState.health--;
                obstacle.classList.add('obs-hit');
            }
        }
    }

    function endRunner() {
        runnerState.isRunning = false;
        document.getElementById('finalScore').textContent = runnerState.distance;
        document.getElementById('gameOverlay').style.display = 'flex';
        document.removeEventListener('keydown', handleRunnerInput);
    }

    function restartRunner() {
        initRunner();
    }

    window.addEventListener('load', () => {
        initQuiz();
    });
</script>

</body>
</html>
