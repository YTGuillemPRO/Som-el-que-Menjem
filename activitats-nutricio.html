<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Nutri-Challenge | IE Temple</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #0f172a; --green: #2ecc71; --red: #e74c3c; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 40px; overflow: hidden; }
        .game-box { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); max-width: 600px; margin: auto; }
        .food-display { font-size: 120px; height: 180px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .btn { padding: 25px; border-radius: 20px; border: none; font-size: 24px; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; }
        .btn-yes { background: var(--green); box-shadow: 0 0 20px rgba(46, 204, 113, 0.4); }
        .btn-no { background: var(--red); box-shadow: 0 0 20px rgba(231, 76, 60, 0.4); }
        .btn:active { transform: scale(0.9); }
        .score { font-size: 24px; margin-bottom: 20px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="game-box">
        <h1>Nutri-Reflex 🍎</h1>
        <div class="score">Puntuació: <span id="score">0</span> / 10</div>
        <div class="food-display" id="food">❓</div>
        <div class="controls">
            <button class="btn btn-yes" onclick="check(true)">ÉS SÀ ✅</button>
            <button class="btn btn-no" onclick="check(false)">NO ÉS SÀ ❌</button>
        </div>
    </div>
    <script>
        const foods = [
            {e: '🥦', h: true}, {e: '🍩', h: false}, {e: '🍎', h: true}, 
            {e: '🍟', h: false}, {e: '🥑', h: true}, {e: '🍕', h: false},
            {e: '🥗', h: true}, {e: '🍭', h: false}, {e: '🥚', h: true}, {e: '🥓', h: false}
        ];
        let score = 0, current = 0;
        function next() {
            if(current < foods.length) {
                document.getElementById('food').innerText = foods[current].e;
            } else {
                document.getElementById('food').innerText = "🏆";
                confetti();
                alert("Final! Puntuació: " + score + "/10");
                window.location.href = 'index.html';
            }
        }
        function check(val) {
            if(foods[current].h === val) {
                score++;
                document.getElementById('score').innerText = score;
            }
            current++;
            next();
        }
        next();
    </script>
</body>
</html>
