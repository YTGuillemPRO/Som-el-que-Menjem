<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activitats Nutrició | IE Temple</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #558b2f;
            --bg: #f1f8e9;
            --energetic: #1565c0; /* Blau */
            --plastic: #c62828;    /* Vermell */
            --regulador: #ef6c00;  /* Taronja */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg);
            padding: 20px;
        }

        .quiz-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .emoji-display {
            font-size: 80px;
            margin: 20px 0;
            display: block;
            animation: bounce 0.5s ease infinite alternate;
        }

        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }

        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }

        .options-grid {
            display: grid;
            gap: 12px;
        }

        .btn-option {
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #eee;
            background: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .btn-option:hover { transform: scale(1.02); background: #f9f9f9; }

        /* Estils de resposta */
        .correct { background: #4caf50 !important; color: white; border-color: #4caf50; }
        .wrong { background: #f44336 !important; color: white; border-color: #f44336; }

        .score-board {
            margin-top: 25px;
            font-weight: 700;
            color: var(--primary);
            font-size: 18px;
        }

        .btn-home {
            margin-top: 30px;
            display: inline-block;
            text-decoration: none;
            color: #888;
            font-size: 14px;
            border-bottom: 1px solid #ccc;
        }

        #feedback {
            margin-top: 15px;
            min-height: 24px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="quiz-card">
        <h2>Repte dels Nutrients</h2>
        <p>Classifica l'aliment segons la seva funció principal:</p>

        <div class="emoji-display" id="food-emoji">🍎</div>
        <h3 id="food-name" style="margin-bottom: 20px; color: #444;">Poma</h3>

        <div class="options-grid">
            <button class="btn-option" onclick="checkAnswer('Regulador')">🌿 Regulador (Vitamines)</button>
            <button class="btn-option" onclick="checkAnswer('Energètic')">⚡ Energètic (Glúcids/Greixos)</button>
            <button class="btn-option" onclick="checkAnswer('Plàstic')">💪 Plàstic (Proteïnes)</button>
        </div>

        <div id="feedback"></div>

        <div class="score-board">
            Punts: <span id="score">0</span> / <span id="total">0</span>
        </div>

        <a href="index.html" class="btn-home">← Tornar al Portal</a>
    </div>

    <script>
        const questions = [
            { emoji: '🍎', name: 'Poma', type: 'Regulador' },
            { emoji: '🍝', name: 'Pasta', type: 'Energètic' },
            { emoji: '🍗', name: 'Pollastre', type: 'Plàstic' },
            { emoji: '🥑', name: 'Alvocat', type: 'Energètic' },
            { emoji: '🥦', name: 'Bròquil', type: 'Regulador' },
            { emoji: '🥚', name: 'Ou', type: 'Plàstic' },
            { emoji: '🥖', name: 'Pa', type: 'Energètic' }
        ];

        let currentIdx = 0;
        let score = 0;
        let total = 0;

        function checkAnswer(selectedType) {
            const current = questions[currentIdx];
            const feedback = document.getElementById('feedback');
            const btns = document.querySelectorAll('.btn-option');
            
            // Bloquejar botons
            btns.forEach(b => b.style.pointerEvents = 'none');

            total++;
            document.getElementById('total').innerText = total;

            if (selectedType === current.type) {
                score++;
                document.getElementById('score').innerText = score;
                feedback.innerText = "✅ Molt bé! És un aliment " + current.type;
                feedback.style.color = "#2e7d32";
            } else {
                feedback.innerText = "❌ Oh! En realitat és " + current.type;
                feedback.style.color = "#c62828";
            }

            // Següent pregunta després de 1.5 segons
            setTimeout(() => {
                currentIdx++;
                if (currentIdx >= questions.length) {
                    // Final del joc
                    document.querySelector('.quiz-card').innerHTML = `
                        <h2>Activitat Finalitzada!</h2>
                        <div style="font-size: 60px; margin: 20px;">🏆</div>
                        <p>Has aconseguit <strong>${score}</strong> de <strong>${questions.length}</strong> punts.</p>
                        <a href="index.html" style="background: #558b2f; color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; display: inline-block; margin-top: 20px; font-weight: bold;">Tornar al Inici</a>
                    `;
                } else {
                    updateQuestion();
                }
            }, 1500);
        }

        function updateQuestion() {
            const current = questions[currentIdx];
            document.getElementById('food-emoji').innerText = current.emoji;
            document.getElementById('food-name').innerText = current.name;
            document.getElementById('feedback').innerText = "";
            const btns = document.querySelectorAll('.btn-option');
            btns.forEach(b => b.style.pointerEvents = 'auto');
        }
    </script>
</body>
</html>
