<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Nutri-Dash App</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #121218;
            --primary: #00e676;
            --danger: #ff3d00;
            --gold: #ffd700;
            --text: #ffffff;
            --accent: #2979ff;
            --surface: #16161d;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            inset: 0;
        }

        /* === LAYOUT GENERAL === */
        .app-view {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            z-index: 10;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
        }
        
        .view-hidden {
            transform: translateY(30px) scale(0.95);
            opacity: 0;
            pointer-events: none;
            z-index: 0;
        }
        
        .active-view {
            transform: translateY(0) scale(1);
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
        }

        /* === MENÚ PRINCIPAL - SCROLL COMPLETO === */
        .menu-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            background: radial-gradient(ellipse at top, #1a1a2e 0%, #0a0a0f 50%, #000000 100%);
        }
        
        /* CONTENEDOR SCROLLABLE - TODO EL CONTENIDO */
        .menu-scroll-wrapper {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            position: relative;
        }
        
        /* Scrollbar personalizada elegante */
        .menu-scroll-wrapper::-webkit-scrollbar {
            width: 4px;
        }
        
        .menu-scroll-wrapper::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .menu-scroll-wrapper::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }
        
        .menu-scroll-wrapper::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }
        
        /* Contenido interno que se mueve completo */
        .menu-content-full {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            padding-bottom: 60px;
        }
        
        .menu-header {
            padding: 80px 40px 50px;
            text-align: center;
            position: relative;
        }
        
        .brand-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 230, 118, 0.1);
            border: 1px solid rgba(0, 230, 118, 0.2);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 28px;
            backdrop-filter: blur(10px);
        }
        
        .brand-icon {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px var(--primary); opacity: 1; }
            50% { box-shadow: 0 0 15px var(--primary); opacity: 0.7; }
        }
        
        .main-title {
            font-size: clamp(42px, 9vw, 58px);
            font-weight: 900;
            line-height: 1.05;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff 0%, #b0b0b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 17px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
            max-width: 340px;
            margin: 0 auto;
            line-height: 1.7;
        }
        
        .menu-cards-section {
            padding: 20px 32px 60px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .game-card {
            position: relative;
            background: linear-gradient(135deg, var(--surface) 0%, rgba(22, 22, 29, 0.8) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 36px 32px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .game-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.02) 100%);
            opacity: 0;
            transition: opacity 0.4s;
        }
        
        .game-card:hover::before,
        .game-card:active::before {
            opacity: 1;
        }
        
        .game-card:hover,
        .game-card:active {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05);
        }
        
        .card-glow {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
            transition: all 0.4s;
        }
        
        .card-quiz .card-glow {
            background: var(--primary);
            top: -80px;
            right: -60px;
        }
        
        .card-runner .card-glow {
            background: var(--gold);
            bottom: -80px;
            left: -60px;
        }
        
        .game-card:hover .card-glow {
            opacity: 0.25;
            transform: scale(1.2);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 18px;
            position: relative;
            z-index: 2;
        }
        
        .card-icon {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
            position: relative;
        }
        
        .icon-quiz {
            background: linear-gradient(135deg, rgba(0, 230, 118, 0.15) 0%, rgba(0, 230, 118, 0.05) 100%);
            color: var(--primary);
            box-shadow: 0 8px 24px rgba(0, 230, 118, 0.15);
        }
        
        .icon-runner {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15) 0%, rgba(255, 215, 0, 0.05) 100%);
            color: var(--gold);
            box-shadow: 0 8px 24px rgba(255, 215, 0, 0.15);
        }
        
        .card-title-group {
            flex: 1;
        }
        
        .card-title {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }
        
        .card-tag {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.6);
        }
        
        .card-description {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.45);
            line-height: 1.6;
            position: relative;
            z-index: 2;
        }
        
        .card-arrow {
            position: absolute;
            right: 28px;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 18px;
            transition: all 0.3s;
            z-index: 2;
        }
        
        .game-card:hover .card-arrow {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-50%) translateX(4px);
            color: rgba(255, 255, 255, 0.7);
        }

        /* === QUIZ UI === */
        .quiz-header {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }
        
        .back-btn {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .back-btn:hover,
        .back-btn:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.96);
        }
        
        .score-display {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 230, 118, 0.1);
            border: 1px solid rgba(0, 230, 118, 0.2);
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 16px;
            color: var(--primary);
        }
        
        .quiz-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding: 40px 24px;
            gap: 40px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .food-card {
            width: 100%;
            max-width:360px;
            background: linear-gradient(180deg, var(--surface) 0%, rgba(22, 22, 29, 0.9) 100%);
            border-radius: 32px;
            padding: 56px 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .food-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(0, 230, 118, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .food-emoji {
            font-size: 120px;
            display: block;
            margin-bottom: 24px;
            animation: pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.3));
        }
        
        @keyframes pop-in {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            70% { transform: scale(1.15) rotate(2deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        
        .food-name {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .food-question {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.45);
            font-weight: 500;
        }
        
        .quiz-controls {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 380px;
            flex-shrink: 0;
        }
        
        .answer-btn {
            flex: 1;
            height: 120px;
            border-radius: 24px;
            border: none;
            font-family: inherit;
            font-size: 19px;
            font-weight: 800;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }
        
        .answer-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .answer-btn:hover::before,
        .answer-btn:active::before {
            opacity: 1;
        }
        
        .btn-yes {
            background: linear-gradient(135deg, var(--primary) 0%, #00c853 100%);
            box-shadow: 
                0 12px 0 #009624,
                0 15px 30px rgba(0, 230, 118, 0.3);
        }
        
        .btn-no {
            background: linear-gradient(135deg, var(--danger) 0%, #dd2c00 100%);
            box-shadow: 
                0 12px 0 #bf360c,
                0 15px 30px rgba(255, 61, 0, 0.3);
        }
        
        .answer-btn:hover {
            transform: translateY(-2px);
        }
        
        .answer-btn:active {
            transform: translateY(8px);
            box-shadow: 
                0 4px 0 currentColor,
                0 8px 20px rgba(0, 0, 0, 0.2);
        }
        
        .btn-label {
            font-size: 11px;
            opacity: 0.75;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* === RUNNER UI === */
        .runner-game {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, #050510 0%, #0a0a20 40%, #000 100%);
            overflow: hidden;
            touch-action: none;
            z-index: 1;
        }
        
        .track-visual {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 75%;
            clip-path: polygon(40% 0%, 60% 0%, 100% 100%, 0% 100%);
            background: linear-gradient(to bottom, #111 0%, #1a1a1a 100%);
            z-index: 2;
        }
        
        .track-line {
            position: absolute;
            bottom: 0;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            width: 2px;
            z-index: 3;
        }
        
        .line-l { left: 0%; transform-origin: bottom center; transform: rotate(18deg); }
        .line-r { right: 0%; transform-origin: bottom center; transform: rotate(-18deg); }
        .line-c1 { left: 50%; transform: translateX(-50%) rotate(6deg); transform-origin: bottom center; }
        .line-c2 { left: 50%; transform: translateX(-50%) rotate(-6deg); transform-origin: bottom center; }

        .road-grid {
            position: absolute;
            bottom: -50%;
            left: 0;
            right: 0;
            height: 100%;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 100% 100px;
            transform-origin: bottom center;
            transform: perspective(500px) rotateX(60deg);
            animation: moveRoad 0.3s linear infinite;
            z-index: 2;
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
        }
        
        @keyframes moveRoad {
            from { background-position: 0 0; }
            to { background-position: 0 100px; }
        }

        .player-container {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            z-index: 50;
            transition: left 0.15s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }
        
        .minion-sprite {
            font-size: 60px;
            filter: drop-shadow(0 15px 10px rgba(0, 0, 0, 0.6));
            animation: runBob 0.3s ease-in-out infinite;
            transition: transform 0.15s ease-out;
            transform-origin: bottom center;
        }
        
        @keyframes runBob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        .player-jump .minion-sprite {
            animation: none;
            transform: translateY(-110px) scaleX(0.85) scaleY(1.2);
        }
        
        .player-slide .minion-sprite {
            animation: none;
            transform: translateY(20px) scaleX(1.3) scaleY(0.4);
        }

        .obstacle-3d {
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            will-change: transform, opacity;
            transition: opacity 0.1s;
        }
        
        .obs-hit {
            opacity: 0 !important;
            transform: translate(-50%, -50%) scale(2) !important;
        }

        .runner-hud {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
            pointer-events: none;
        }
        
        .hud-stat {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 800;
            font-size: 17px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .game-overlay {
            position: absolute;
            inset: 0;
            z-index: 300;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 48px;
            text-align: center;
        }
        
        .overlay-icon {
            font-size: 72px;
            margin-bottom: 28px;
            filter: drop-shadow(0 10px 30px rgba(255, 215, 0, 0.4));
        }
        
        .overlay-title {
            font-size: 38px;
            font-weight: 900;
            margin-bottom: 12px;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .overlay-subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 40px;
            line-height: 1.7;
            max-width: 340px;
        }
        
        .primary-btn {
            background: linear-gradient(135deg, #fff 0%, #e8e8e8 100%);
            color: #000;
            border: none;
            padding: 20px 48px;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
            box-shadow: 
                0 8px 0 rgba(0, 0, 0, 0.2),
                0 15px 40px rgba(255, 255, 255, 0.15);
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: 0.5px;
        }
        
        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 10px 0 rgba(0, 0, 0, 0.2),
                0 20px 50px rgba(255, 255, 255, 0.2);
        }
        
        .primary-btn:active {
            transform: translateY(6px);
            box-shadow: 
                0 2px 0 rgba(0, 0, 0, 0.2),
                0 8px 20px rgba(255, 255, 255, 0.1);
        }
        
        .secondary-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 34px;
            margin-top: 24px;
            cursor: pointer;
            padding: 12px;
            transition: all 0.2s;
        }
        
        .secondary-btn:hover {
            color: rgba(255, 255, 255, 0.8);
            transform: scale(1.1);
        }
        
        .final-score-label {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        
        .final-score-value {
            font-size: 64px;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 40px;
            text-shadow: 0 10px 40px rgba(255, 215, 0, 0.4);
        }

        /* === RESPONSIVE === */
        @media (max-width: 480px) {
            .menu-header {
                padding: 64px 24px 40px;
            }
            
            .main-title {
                font-size: clamp(38px, 10vw, 52px);
            }
            
            .menu-cards-section {
                padding: 16px 20px 48px;
                gap: 20px;
            }
            
            .game-card {
                padding: 28px 24px;
            }
            
            .card-icon {
                width: 56px;
                height: 56px;
                font-size: 24px;
            }
            
            .card-title {
                font-size: 21px;
            }
            
            .card-description {
                font-size: 14px;
            }
            
            .card-arrow {
                width: 40px;
                height: 40px;
                right: 20px;
            }
            
            .quiz-controls {
                gap: 16px;
            }
            
            .answer-btn {
                height: 110px;
                font-size: 17px;
            }
        }
    </style>
</head>
<body>

<!-- === PANTALLA 1: MENÚ - SCROLL COMPLETO LIMPIO === -->
<div id="viewMenu" class="app-view active-view">
    <div class="menu-container">
        <!-- TODO EL CONTENIDO ES SCROLLABLE -->
        <div class="menu-scroll-wrapper">
            <div class="menu-content-full">
                
                <!-- HEADER -->
                <div class="menu-header">
                    <div class="brand-badge">
                        <span class="brand-icon"></span>
                        Nutri • Dash
                    </div>
                    <h1 class="main-title">Benvingut</h1>
                    <p class="subtitle">Desafia la teva ment i les teves reflexes en dues experiències úniques i emocionants</p>
                </div>
                
                <!-- CARDS DE JUEGO -->
                <div class="menu-cards-section">
                    
                    <!-- Mode Quiz -->
                    <button class="game-card card-quiz" onclick="nav.to('quiz')">
                        <div class="card-glow"></div>
                        <div class="card-header">
                            <div class="card-icon icon-quiz">
                                <i class="fa-solid fa-brain"></i>
                            </div>
                            <div class="card-title-group">
                                <h3 class="card-title">Mode Preguntes</h3>
                                <span class="card-tag">Mental</span>
                            </div>
                            <div class="card-arrow">
                                <i class="fa-solid fa-arrow-right"></i>
                            </div>
                        </div>
                        <p class="card-description">Ràpid, mental i adictiu. Identifica aliments saludables en un rellotge contrarellotge.</p>
                    </button>

                    <!-- Mode Runner -->
                    <button class="game-card card-runner" onclick="nav.to('runner')">
                        <div class="card-glow"></div>
                        <div class="card-header">
                            <div class="card-icon icon-runner">
                                <i class="fa-solid fa-bolt"></i>
                            </div>
                            <div class="card-title-group">
                                <h3 class="card-title">Mode Carrera</h3>
                                <span class="card-tag">Acció</span>
                            </div>
                            <div class="card-arrow">
                                <i class="fa-solid fa-arrow-right"></i>
                            </div>
                        </div>
                        <p class="card-description">Minion Run: Córrer a tota velocitat, esquivar obstacles i recollir premis.</p>
                    </button>

                </div>
                
            </div>
        </div>
    </div>
</div>

<!-- === PANTALLA 2: QUIZ === -->
<div id="viewQuiz" class="app-view view-hidden">
    <div class="quiz-header">
        <button class="back-btn" onclick="nav.to('menu')">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <div class="score-display">
            <i class="fa-solid fa-star"></i>
            <span id="qScoreVal">0</span>
        </div>
    </div>
    
    <div class="quiz-container">
        <div class="food-card">
            <span id="qEmoji" class="food-emoji">🍎</span>
            <h2 id="qName" class="food-name">Poma</h2>
            <p class="food-question">És saludable?</p>
        </div>
        
        <div class="quiz-controls">
            <button class="answer-btn btn-yes" onclick="quiz.ans(true)">
                <i class="fa-solid fa-check" style="font-size: 28px;"></i>
                <span class="btn-label">SÍ</span>
            </button>
            <button class="answer-btn btn-no" onclick="quiz.ans(false)">
                <i class="fa-solid fa-xmark" style="font-size: 28px;"></i>
                <span class="btn-label">NO</span>
            </button>
        </div>
    </div>
</div>

<!-- === PANTALLA 3: RUNNER (MINION RUSH) === -->
<div id="viewRunner" class="app-view view-hidden">
    
    <div id="runnerGameArea" class="runner-game">
        <div class="road-grid"></div>
        <div class="track-visual"></div>
        <div class="track-line line-l"></div>
        <div class="track-line line-r"></div>
        <div class="track-line line-c1"></div>
        <div class="track-line line-c2"></div>
        
        <div class="runner-hud">
            <div class="hud-stat" style="color: var(--gold)">
                <i class="fa-solid fa-star"></i> 
                <span id="rScore">0</span>
            </div>
            <div class="hud-stat" style="color: var(--danger)">
                <span id="rLives">❤️❤️❤️</span>
            </div>
        </div>

        <div class="player-container" id="player">
            <div class="minion-sprite">🏃</div>
        </div>
    </div>

    <div id="runnerOverlay" class="game-overlay">
        <div class="overlay-icon">🏃</div>
        <h2 class="overlay-title">MINION RUN</h2>
        <p class="overlay-subtitle">
            Llisca per moure't<br>
            Saltar i ajupir-te!<br><br>
            <strong style="color: rgba(255,255,255,0.7); font-size: 14px;">
                Fletxes del teclat: ← → ↑ ↓
            </strong>
        </p>
        <button class="primary-btn" onclick="runner.start()">CÓRRER</button>
        <button class="secondary-btn" onclick="nav.to('menu')">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <div id="runnerGameOver" class="game-overlay" style="display:none">
        <div class="overlay-icon" style="font-size: 64px;">💥</div>
        <h2 class="overlay-title" style="background: linear-gradient(135deg, #ff3d00 0%, #ff6e40 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">GAME OVER</h2>
        <p class="final-score-label">Puntuació Final</p>
        <h1 class="final-score-value" id="finalRScore">0</h1>
        <button class="primary-btn" onclick="runner.start()">TORNAR-HO A PROVAR</button>
        <button class="secondary-btn" onclick="nav.to('menu')">
            <i class="fa-solid fa-house"></i>
        </button>
    </div>
</div>

<script>
// --- AUDIO ---
const Aud = {
    ctx: null,
    init: function(){ 
        if(!this.ctx) this.ctx = new(window.AudioContext||window.webkitAudioContext)(); 
        if(this.ctx.state==='suspended') this.ctx.resume(); 
    },
    t: function(f, type, d, v=0.1){ 
        if(!this.ctx)return; 
        const o=this.ctx.createOscillator(), g=this.ctx.createGain(); 
        o.type=type; o.frequency.value=f; 
        g.gain.setValueAtTime(v, this.ctx.currentTime); 
        g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime+d); 
        o.connect(g); g.connect(this.ctx.destination); 
        o.start(); o.stop(this.ctx.currentTime+d); 
    },
    click: function(){ this.init(); this.t(800, 'sine', 0.05); },
    coin: function(){ this.init(); this.t(1200, 'sine', 0.1); setTimeout(()=>this.t(1800, 'sine', 0.1), 50); },
    hit: function(){ this.init(); this.t(100, 'sawtooth', 0.3, 0.2); },
    jump: function(){ this.init(); this.t(400, 'triangle', 0.1); },
    slide: function(){ this.init(); this.t(150, 'sawtooth', 0.1, 0.05); }
};

// --- NAVEGACIÓ ---
const nav = {
    to: function(viewId) {
        Aud.click();
        document.querySelectorAll('.app-view').forEach(v => {
            v.classList.remove('active-view');
            v.classList.add('view-hidden');
        });
        const target = document.getElementById('view'+viewId.charAt(0).toUpperCase()+viewId.slice(1));
        if(target) {
            target.classList.remove('view-hidden');
            void target.offsetWidth; // Força reflow
            target.classList.add('active-view');
        }
        
        if(viewId === 'quiz') quiz.init();
        if(viewId !== 'runner') runner.stop();
        
        // Resetear scroll del menú al volver
        if(viewId === 'menu') {
            const scrollWrapper = document.querySelector('.menu-scroll-wrapper');
            if(scrollWrapper) {
                setTimeout(() => {
                    scrollWrapper.scrollTop = 0;
                }, 100);
            }
        }
    }
};

// --- JOC 1: QUIZ ---
const foods=[
    {e:'🥦',n:'Broquil',g:1},
    {e:'🍎',n:'Poma',g:1},
    {e:'🥑',n:'Alvocat',g:1},
    {e:'🍗',n:'Pollastre',g:1},
    {e:'🍩',n:'Donut',g:0},
    {e:'🍔',n:'Hamburguesa',g:0},
    {e:'🍟',n:'Patates',g:0},
    {e:'🍕',n:'Pizza',g:0},
    {e:'🍇',n:'Raim',g:1},
    {e:'🍓',n:'Maduixa',g:1},
    {e:'🧁',n:'Pastis',g:0},
    {e:'🥤',n:'Refresc',g:0}
];

const quiz = {
    active: false, 
    score: 0,
    
    init: function(){ 
        this.active=true; 
        this.score=0; 
        document.getElementById('qScoreVal').innerText='0'; 
        this.loadFood(); 
    },
    
    loadFood: function(){
        const f = foods[Math.floor(Math.random()*foods.length)];
        this.currentFood = f;
        document.getElementById('qEmoji').innerText=f.e;
        document.getElementById('qName').innerText=f.n;
        
        // Re-animar emoji
        const el = document.getElementById('qEmoji');
        el.style.animation = 'none';
        void el.offsetWidth;
        el.style.animation = 'pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
    },
    
    ans: function(yes){
        if(!this.active) return;
        Aud.init();
        const correct = (yes && this.currentFood.g) || (!yes && !this.currentFood.g);
        
        if(correct){ 
            this.score += 10; 
            Aud.coin(); 
        } else { 
            this.score = Math.max(0, this.score - 5); 
            Aud.hit(); 
        }
        
        document.getElementById('qScoreVal').innerText = this.score;
        
        const el = document.getElementById('qEmoji');
        el.style.transform='scale(0)';
        setTimeout(()=>{ 
            el.style.transform='scale(1)'; 
            this.loadFood(); 
        }, 150);
    }
};

// --- JOC 2: RUNNER (MINION RUSH STYLE) ---
const runner = {
    active: false, 
    score: 0, 
    lives: 3, 
    lane: 1, 
    speed: 0.015, 
    objects: [], 
    animId: null, 
    spawnTimer: 0,
    playerState: 'run',
    
    project: function(lane, z) {
        const vpX = window.innerWidth / 2;
        const vpY = window.innerHeight * 0.35; 
        const baseY = window.innerHeight * 0.85; 
        const laneOffsets = [-0.25, 0, 0.25]; 
        const baseX = vpX + laneOffsets[lane] * window.innerWidth;
        const depth = Math.pow(z, 1.5); 
        const x = vpX + (baseX - vpX) * depth;
        const y = vpY + (baseY - vpY) * depth;
        const scale = Math.pow(z, 2) * 1.5;
        return { x, y, scale };
    },

    start: function(){
        Aud.init();
        this.active=true; 
        this.score=0; 
        this.lives=3; 
        this.lane=1; 
        this.speed=0.015; 
        this.objects=[]; 
        this.spawnTimer=0;
        this.playerState = 'run';
        
        document.getElementById('runnerOverlay').style.display='none';
        document.getElementById('runnerGameOver').style.display='none';
        document.querySelectorAll('.obstacle-3d').forEach(e=>e.remove());
        
        const p = document.getElementById('player');
        p.style.left = '50%';
        p.className = 'player-container';
        
        this.updateHUD();
        this.loop();
    },
    
    stop: function(){ 
        this.active=false; 
        if(this.animId) cancelAnimationFrame(this.animId); 
    },
    
    moveLane: function(dir){
        if(!this.active) return;
        Aud.jump();
        if(dir==='left' && this.lane > 0) this.lane--;
        if(dir==='right' && this.lane < 2) this.lane++;
        const positions = ['25%', '50%', '75%'];
        document.getElementById('player').style.left = positions[this.lane];
    },

    jump: function(){
        if(!this.active || this.playerState !== 'run') return;
        this.playerState = 'jump';
        const p = document.getElementById('player');
        p.classList.add('player-jump');
        Aud.jump();
        setTimeout(() => { 
            p.classList.remove('player-jump'); 
            this.playerState = 'run'; 
        }, 500);
    },

    slide: function(){
        if(!this.active || this.playerState !== 'run') return;
        this.playerState = 'slide';
        const p = document.getElementById('player');
        p.classList.add('player-slide');
        Aud.slide();
        setTimeout(() => { 
            p.classList.remove('player-slide'); 
            this.playerState = 'run'; 
        }, 600);
    },

    spawn: function(){
        const lane = Math.floor(Math.random()*3);
        const rand = Math.random();
        let type, emoji;
        
        if(rand < 0.3) { type='coin'; emoji='🍌'; }
        else if(rand < 0.6) { type='low'; emoji='🪵'; } 
        else if(rand < 0.8) { type='high'; emoji='🍩'; } 
        else { type='lane'; emoji='🍔'; } 
        
        const el = document.createElement('div');
        el.className='obstacle-3d';
        el.innerText=emoji;
        document.getElementById('runnerGameArea').appendChild(el);
        this.objects.push({ el, z: 0, lane, type, hit: false });
    },

    loop: function(){
        if(!this.active) return;
        this.animId = requestAnimationFrame(()=>this.loop());
        
        if(this.speed < 0.04) this.speed += 0.000005;
        this.score += Math.floor(this.speed * 10);
        this.updateHUD();
        
        this.spawnTimer += this.speed;
        if(this.spawnTimer > 0.8) { 
            this.spawn(); 
            this.spawnTimer = 0; 
        }

        for(let i=this.objects.length-1; i>=0; i--){
            let o = this.objects[i];
            o.z += this.speed; 
            
            if(o.z > 1.2){
                o.el.remove();
                this.objects.splice(i,1);
                continue;
            }
            
            const proj = this.project(o.lane, o.z);
            o.el.style.left = proj.x + 'px';
            o.el.style.top = proj.y + 'px';
            o.el.style.transform = `translate(-50%, -50%) scale(${proj.scale})`;
            o.el.style.zIndex = Math.floor(o.z * 100);
            o.el.style.fontSize = (30 * proj.scale) + 'px';

            if(!o.hit && o.z > 0.82 && o.z < 0.95 && o.lane === this.lane){
                let isColliding = false;
                
                if(o.type === 'coin') { 
                    this.score += 50; 
                    Aud.coin(); 
                    o.hit=true; 
                    o.el.classList.add('obs-hit'); 
                } 
                else if(o.type === 'lane') { isColliding = true; }
                else if(o.type === 'low' && this.playerState !== 'jump') { isColliding = true; }
                else if(o.type === 'high' && this.playerState !== 'slide') { isColliding = true; }
                
                if(isColliding) { 
                    o.hit = true; 
                    this.registerHit(o); 
                }
            }
        }
    },

    registerHit: function(o){
        this.lives--;
        Aud.hit();
        if(navigator.vibrate) navigator.vibrate(200);
        o.el.classList.add('obs-hit'); 
        this.updateHUD();
        
        const area = document.getElementById('runnerGameArea');
        area.style.boxShadow = 'inset 0 0 50px rgba(255,0,0,0.5)';
        setTimeout(()=> area.style.boxShadow = 'none', 200);
        
        if(this.lives <= 0) this.gameOver();
    },

    updateHUD: function(){
        document.getElementById('rScore').innerText = this.score;
        document.getElementById('rLives').innerText = '❤️'.repeat(Math.max(0, this.lives));
    },

    gameOver: function(){
        this.stop();
        document.getElementById('finalRScore').innerText = this.score;
        document.getElementById('runnerGameOver').style.display='flex';
        if(this.score > 500) confetti({ particles: 100, spread: 70, origin: { y: 0.6 } });
    }
};

// --- GESTOS TOUCH (SWIPE) ---
let touchStartX = 0, touchStartY = 0;

document.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
}, {passive: true});

document.addEventListener('touchend', e => {
    if(!runner.active) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);
    
    if(Math.max(absDx, absDy) > 30) {
        if(absDx > absDy) {
            if(dx > 0) runner.moveLane('right'); 
            else runner.moveLane('left');
        } else {
            if(dy < 0) runner.jump(); 
            else runner.slide();
        }
    }
}, {passive: true});

// --- CONTROLS DE TECLAT (PC) ---
document.addEventListener('keydown', e => {
    if(!runner.active) return;
    switch(e.key) {
        case 'ArrowLeft': runner.moveLane('left'); break;
        case 'ArrowRight': runner.moveLane('right'); break;
        case 'ArrowUp': case ' ': runner.jump(); break;
        case 'ArrowDown': runner.slide(); break;
    }
});
</script>
